<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const SIZES = [
  { id: "card",   label: "카드 4:5",    w: 1080, h: 1350  },
];

const ACCENTS = [
  { id: "white",  hex: "#ffffff", label: "화이트" },
  { id: "yellow", hex: "#f5c518", label: "골드"   },
  { id: "cyan",   hex: "#00d4ff", label: "시안"   },
  { id: "red",    hex: "#ff3b3b", label: "레드"   },
];

// ─── helpers ────────────────────────────────────────────────────
function wrapText(ctx, text, maxW) {
  const paragraphs = text.split("\n");
  const lines = [];
  for (const para of paragraphs) {
    if (!para.trim()) { lines.push(""); continue; }
    const words = para.split(" ");
    let cur = "";
    for (const w of words) {
      const test = cur ? cur + " " + w : w;
      if (ctx.measureText(test).width > maxW && cur) { lines.push(cur); cur = w; }
      else { cur = test; }
    }
    if (cur) lines.push(cur);
  }
  return lines;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

/**
 * Calculate the minimum photo ratio so text fits with comfortable padding.
 * Returns a value between minRatio and maxRatio.
 */
function calcAutoPhotoRatio(W, H, headline, body, manualRatio, showBranding, textPadX) {
  const tmp = document.createElement("canvas");
  tmp.width = W; tmp.height = H;
  const ctx = tmp.getContext("2d");
  const pad = W * (textPadX ?? 0.08);

  const hSize = Math.round(W * 0.072);
  ctx.font = `900 ${hSize}px Pretendard, 'Noto Sans KR', sans-serif`;
  const hLines = wrapText(ctx, headline || "", W - pad * 2);

  const bSize = Math.round(W * 0.034);
  ctx.font = `${bSize}px Pretendard, 'Noto Sans KR', sans-serif`;
  const bLines = wrapText(ctx, body || "", W - pad * 2.2);

  const totalH = hLines.length * hSize * 1.18;
  const totalB = bLines.length * bSize * 1.65;
  const gap    = bLines.length ? H * 0.055 : 0;
  const stripH = showBranding ? H * 0.042 : 0;

  // Desired text area = content + vertical padding (top + bottom each 8%)
  const needed = totalH + gap + totalB + stripH + H * 0.16;
  const autoRatio = Math.max(0.20, Math.min(0.98, 1 - needed / H));

  // Use whichever is smaller: manual preference or auto-needed
  return Math.min(manualRatio, autoRatio);
}

// ─── Canvas draw ────────────────────────────────────────────────
function drawCanvas(canvas, config, size, imgEl) {
  const ctx = canvas.getContext("2d");
  const W = size.w, H = size.h;

  const accent      = config.accentColor || "#ffffff";
  const pad         = W * (config.textPadX ?? 0.08);
  const layout      = config.layout || "split"; // "split" or "overlay"

  if (layout === "overlay") {
    canvas.width = W; canvas.height = H;
    return drawOverlay(ctx, W, H, config, imgEl, accent, pad);
  }

  // Split mode: canvas only grows when photoRatio > 1.0
  const manualRatio = config.photoRatio ?? 0.60;
  const photoH      = Math.round(H * manualRatio);
  const minTextH    = Math.round(H * 0.15);
  const textH       = Math.max(minTextH, H - photoH);
  const canvasH     = photoH + textH;
  canvas.width = W; canvas.height = canvasH;
  const stripH      = config.showBranding ? Math.round(H*0.042) : 0;

  // Measure text
  let hSize = Math.round(W*0.072 * (config.headSizeScale ?? 1));
  ctx.font=`900 ${hSize}px Pretendard, 'Noto Sans KR', sans-serif`;
  let hLines = wrapText(ctx, config.headline||"", W-pad*2);
  let bSize  = Math.round(W*0.034 * (config.bodySizeScale ?? 1));
  ctx.font=`${bSize}px Pretendard, 'Noto Sans KR', sans-serif`;
  let bLines = wrapText(ctx, config.body||"", W-pad*2.2);
  const gapBase = bLines.length ? (textH - stripH)*0.04 : 0;
  const gap     = gapBase * (config.textGap ?? 1);
  let hLH = hSize*1.15;
  let bLH = bSize * 1.55 * (config.bodyLineHeight ?? 1);
  let totalH = hLines.length * hLH;
  let totalB = bLines.length * bLH;
  let total  = totalH + gap + totalB;
  const usableTextH = textH - stripH;
  const maxTextSpace = usableTextH * 0.88;

  // Auto-shrink if text overflows (proportional)
  if (total > maxTextSpace && total > 0) {
    const ratio = maxTextSpace / total;
    hSize  = Math.max(12, Math.floor(hSize * ratio));
    bSize  = Math.max(10, Math.floor(bSize * ratio));
    hLH = hSize * 1.15;
    bLH = bSize * 1.55 * (config.bodyLineHeight ?? 1);
    ctx.font=`900 ${hSize}px Pretendard, 'Noto Sans KR', sans-serif`;
    hLines = wrapText(ctx, config.headline||"", W-pad*2);
    ctx.font=`${bSize}px Pretendard, 'Noto Sans KR', sans-serif`;
    bLines = wrapText(ctx, config.body||"", W-pad*2.2);
    totalH = hLines.length * hLH;
    totalB = bLines.length * bLH;
    total  = totalH + gap + totalB;
  }

  // ── Photo area
  if (imgEl) {
    const iR = imgEl.width / imgEl.height, aR = W / photoH;
    let baseW, baseH;
    if (iR > aR) { baseH = photoH; baseW = photoH * iR; }
    else          { baseW = W;     baseH = W / iR; }

    const scale  = config.imgScale  ?? 1;
    const ox     = config.imgOffsetX ?? 0;
    const oy     = config.imgOffsetY ?? 0;

    const drawW = baseW * scale;
    const drawH = baseH * scale;
    const drawX = (W - drawW) / 2 + ox * (drawW - W) / 2;
    const drawY = (photoH - drawH) / 2 + oy * (drawH - photoH) / 2;

    ctx.save();
    ctx.beginPath();
    ctx.rect(0, 0, W, photoH);
    ctx.clip();
    ctx.drawImage(imgEl, drawX, drawY, drawW, drawH);
    ctx.restore();
    const fade = ctx.createLinearGradient(0, photoH*0.55, 0, photoH);
    fade.addColorStop(0,"rgba(0,0,0,0)"); fade.addColorStop(1,"rgba(0,0,0,0.55)");
    ctx.fillStyle=fade; ctx.fillRect(0,0,W,photoH);
  } else {
    ctx.fillStyle="#181818"; ctx.fillRect(0,0,W,photoH);
    ctx.fillStyle="#303030";
    ctx.font=`${Math.round(W*0.028)}px Pretendard, 'Noto Sans KR', sans-serif`;
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("📷  제품 사진을 업로드하세요", W/2, photoH/2);
  }

  // ── Text background
  ctx.fillStyle="#000"; ctx.fillRect(0,photoH,W,textH);
  ctx.fillStyle=accent+"50"; ctx.fillRect(0,photoH,W,2);

  // ── Badge
  if (config.showBadge && config.badge?.trim()) {
    const bFont = Math.round(W*0.022);
    ctx.font=`bold ${bFont}px Pretendard, 'Noto Sans KR', sans-serif`;
    const bW=ctx.measureText(config.badge).width+30, bH=bFont+18;
    const bX=W/2-bW/2, bY=photoH-bH-Math.round(H*0.022);
    ctx.fillStyle="rgba(0,0,0,0.82)";
    roundRect(ctx,bX,bY,bW,bH,3); ctx.fill();
    ctx.strokeStyle="#ffffff90"; ctx.lineWidth=1.5;
    roundRect(ctx,bX,bY,bW,bH,3); ctx.stroke();
    ctx.fillStyle="#ffffff"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(config.badge, W/2, bY+bH/2);
  }

  const vPad = usableTextH * 0.08;

  const vAlign  = config.textVAlign ?? 0;
  const freeSpace = usableTextH - total;
  const topPad  = vPad + (freeSpace - vPad*2) * (vAlign * 0.5 + 0.5);
  const autoHeadY = photoH + topPad;
  const autoBodyY = autoHeadY + totalH + gap;

  const align = config.textAlign || "center";
  const autoTextX = align === "left" ? pad : align === "right" ? W - pad : W/2;

  // Free positioning: use stored coords or auto
  const useFree = config.freePos;
  const headX = useFree && config.headPos ? config.headPos.x * W : autoTextX;
  const headY = useFree && config.headPos ? config.headPos.y * canvasH : autoHeadY;
  const bodyX = useFree && config.bodyPos ? config.bodyPos.x * W : autoTextX;
  const bodyStartY = useFree && config.bodyPos ? config.bodyPos.y * canvasH : autoBodyY;
  const headAlign = align;
  const bodyAlign = align;

  hLines.forEach((line,i) => {
    ctx.font=`900 ${hSize}px Pretendard, 'Noto Sans KR', sans-serif`;
    ctx.textAlign=headAlign; ctx.textBaseline="top";
    ctx.fillStyle="rgba(0,0,0,0.4)";
    ctx.fillText(line, headX+2, headY+i*hLH+2);
    ctx.fillStyle=accent;
    ctx.fillText(line, headX, headY+i*hLH);
  });

  bLines.forEach((line,i) => {
    ctx.font=`${bSize}px Pretendard, 'Noto Sans KR', sans-serif`;
    ctx.fillStyle="#ffffff";
    ctx.textAlign=bodyAlign; ctx.textBaseline="top";
    ctx.fillText(line, bodyX, bodyStartY+i*bLH);
  });

  if (config.showBranding) {
    const fixedPad = W * 0.08;
    ctx.fillStyle="#0f0f0f"; ctx.fillRect(0,canvasH-stripH,W,stripH);
    ctx.fillStyle=accent+"30"; ctx.fillRect(0,canvasH-stripH,W,1);
    const sf=Math.round(W*0.018);
    ctx.font=`bold ${sf}px Pretendard, 'Noto Sans KR', sans-serif`;
    ctx.textAlign="left"; ctx.textBaseline="middle";
    ctx.fillStyle="#ffffff";
    ctx.fillText(config.company||"하이픽셀플러스", fixedPad*0.6, canvasH-stripH/2);
    ctx.textAlign="right"; ctx.fillStyle="#444";
    ctx.fillText("Blackmagic Design Authorized Reseller", W-fixedPad*0.6, canvasH-stripH/2);
  }

  ctx.textAlign="left"; ctx.textBaseline="alphabetic";
}

// ─── Overlay mode draw ──────────────────────────────────────────
function drawOverlay(ctx, W, H, config, imgEl, accent, pad) {
  const stripH = config.showBranding ? Math.round(H*0.042) : 0;
  const gradStart = config.overlayStart ?? 0.35;
  const textPadX = W * (config.textPadX ?? 0.08); // horizontal padding

  // ── Full-bleed image
  if (imgEl) {
    const iR = imgEl.width / imgEl.height, aR = W / H;
    let baseW, baseH;
    if (iR > aR) { baseH = H; baseW = H * iR; }
    else          { baseW = W; baseH = W / iR; }

    const scale  = config.imgScale  ?? 1;
    const ox     = config.imgOffsetX ?? 0;
    const oy     = config.imgOffsetY ?? 0;
    const drawW = baseW * scale;
    const drawH = baseH * scale;
    const drawX = (W - drawW) / 2 + ox * (drawW - W) / 2;
    const drawY = (H - drawH) / 2 + oy * (drawH - H) / 2;

    ctx.drawImage(imgEl, drawX, drawY, drawW, drawH);
  } else {
    ctx.fillStyle="#181818"; ctx.fillRect(0,0,W,H);
    ctx.fillStyle="#303030";
    ctx.font=`${Math.round(W*0.028)}px Pretendard, 'Noto Sans KR', sans-serif`;
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("📷  제품 사진을 업로드하세요", W/2, H*0.35);
  }

  // ── Bottom gradient overlay (visual only, does NOT affect text position)
  const gradY = Math.round(H * gradStart);
  const fade = ctx.createLinearGradient(0, gradY, 0, H);
  fade.addColorStop(0, "rgba(0,0,0,0)");
  fade.addColorStop(0.5, "rgba(0,0,0,0.6)");
  fade.addColorStop(1, "rgba(0,0,0,0.92)");
  ctx.fillStyle = fade;
  ctx.fillRect(0, gradY, W, H - gradY);

  // ── Measure text (independent of gradient position)
  let hSize = Math.round(W * 0.08 * (config.headSizeScale ?? 1));
  ctx.font = `900 ${hSize}px Pretendard, 'Noto Sans KR', sans-serif`;
  let hLines = wrapText(ctx, config.headline || "", W - textPadX * 2);

  let bSize = Math.round(W * 0.034 * (config.bodySizeScale ?? 1));
  ctx.font = `${bSize}px Pretendard, 'Noto Sans KR', sans-serif`;
  const bLines = wrapText(ctx, config.body || "", W - textPadX * 2);

  let subSize = Math.round(W * 0.03);
  const subText = (config.showBadge && config.badge?.trim()) || "";

  const gapBase = bLines.length ? H * 0.03 : 0;
  const gap = gapBase * (config.textGap ?? 1);
  let hLH = hSize * 1.15;
  let bLH = bSize * 1.55 * (config.bodyLineHeight ?? 1);
  const subH = subText ? subSize * 1.6 : 0;
  let totalH = hLines.length * hLH;
  let totalB = bLines.length * bLH;

  let contentH = subH + totalH + gap + totalB;
  const textAreaTop = H * 0.40;
  const usableH = H - textAreaTop - stripH - H * 0.04;

  if (contentH > usableH) {
    const ratio = usableH / contentH;
    hSize = Math.floor(hSize * ratio);
    bSize = Math.floor(bSize * ratio);
    subSize = Math.floor(subSize * ratio);
    hLH = hSize * 1.15;
    bLH = bSize * 1.55;
    ctx.font = `900 ${hSize}px Pretendard, 'Noto Sans KR', sans-serif`;
    hLines = wrapText(ctx, config.headline || "", W - textPadX * 2);
    totalH = hLines.length * hLH;
    totalB = bLines.length * bLH;
    contentH = (subText ? subSize * 1.6 : 0) + totalH + gap + totalB;
  }

  const vAlign = config.textVAlign ?? 0.5;
  const freeSpace = usableH - contentH;
  const topOffset = textAreaTop + freeSpace * (vAlign * 0.5 + 0.5);
  let curY = topOffset;

  const align = config.textAlign || "center";
  const autoOTextX = align === "left" ? textPadX : align === "right" ? W - textPadX : W / 2;

  const useFree = config.freePos;
  const oHeadX = useFree && config.headPos ? config.headPos.x * W : autoOTextX;
  const oHeadY = useFree && config.headPos ? config.headPos.y * H : curY + (subText ? subSize * 1.6 : 0);
  const oBodyX = useFree && config.bodyPos ? config.bodyPos.x * W : autoOTextX;
  const oBodyY = useFree && config.bodyPos ? config.bodyPos.y * H : curY + (subText ? subSize * 1.6 : 0) + totalH + gap;
  const oAlign = align;

  if (subText && !useFree) {
    ctx.font = `bold ${subSize}px Pretendard, 'Noto Sans KR', sans-serif`;
    ctx.textAlign = align; ctx.textBaseline = "top";
    ctx.fillStyle = "#ffffff";
    ctx.fillText(subText, autoOTextX, curY);
    curY += subSize * 1.6;
  }

  hLines.forEach((line, i) => {
    ctx.font = `900 ${hSize}px Pretendard, 'Noto Sans KR', sans-serif`;
    ctx.textAlign = oAlign; ctx.textBaseline = "top";
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.fillText(line, oHeadX + 2, oHeadY + i * hLH + 2);
    ctx.fillStyle = accent;
    ctx.fillText(line, oHeadX, oHeadY + i * hLH);
  });

  bLines.forEach((line, i) => {
    ctx.font = `${bSize}px Pretendard, 'Noto Sans KR', sans-serif`;
    ctx.fillStyle = "#ffffff";
    ctx.textAlign = oAlign; ctx.textBaseline = "top";
    ctx.fillText(line, oBodyX, oBodyY + i * bLH);
  });

  const fixedPad = W * 0.08;
  if (config.showBranding) {
    ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(0, H - stripH, W, stripH);
    const sf = Math.round(W * 0.018);
    ctx.font = `bold ${sf}px Pretendard, 'Noto Sans KR', sans-serif`;
    ctx.textAlign = "left"; ctx.textBaseline = "middle";
    ctx.fillStyle = "#ffffff";
    ctx.fillText(config.company || "하이픽셀플러스", fixedPad * 0.6, H - stripH / 2);
    ctx.textAlign = "right"; ctx.fillStyle = "#666";
    ctx.fillText("Blackmagic Design Authorized Reseller", W - fixedPad * 0.6, H - stripH / 2);
  }

  ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
}

// ─── Gaussian blur brush ─────────────────────────────────────────
function applyMosaic(canvas, strokes) {
  if (!strokes || !strokes.length) return;
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;

  // For each stroke, create a blurred copy of the region and composite it
  for (const stroke of strokes) {
    if (!stroke.length) continue;
    const r0 = stroke[0].r || 30;
    const blurAmt = Math.max(4, Math.round(r0 * 0.6));

    // Build a clipping path from all points in this stroke
    ctx.save();
    ctx.beginPath();
    for (const pt of stroke) {
      const r = pt.r || 30;
      ctx.moveTo(pt.x + r, pt.y);
      ctx.arc(pt.x, pt.y, r, 0, Math.PI * 2);
    }
    ctx.clip();

    // Draw blurred version of the canvas into the clipped region
    // Use CanvasRenderingContext2D.filter for real gaussian blur
    if (typeof ctx.filter !== "undefined") {
      // Create temp canvas with current image
      const tmp = document.createElement("canvas");
      tmp.width = W; tmp.height = H;
      const tctx = tmp.getContext("2d");
      tctx.filter = `blur(${blurAmt}px)`;
      tctx.drawImage(canvas, 0, 0);
      ctx.drawImage(tmp, 0, 0);
    } else {
      // Fallback: simple pixelation for old browsers
      const ps = Math.max(8, Math.round(r0 * 0.4));
      for (const pt of stroke) {
        const r = pt.r || 30;
        const left = Math.max(0, Math.floor((pt.x - r) / ps) * ps);
        const top  = Math.max(0, Math.floor((pt.y - r) / ps) * ps);
        for (let bx = left; bx < Math.min(W, pt.x + r); bx += ps) {
          for (let by = top; by < Math.min(H, pt.y + r); by += ps) {
            const dx = bx + ps/2 - pt.x, dy = by + ps/2 - pt.y;
            if (dx*dx + dy*dy > r*r) continue;
            const d = ctx.getImageData(Math.min(bx,W-1), Math.min(by,H-1), 1, 1).data;
            ctx.fillStyle = `rgb(${d[0]},${d[1]},${d[2]})`;
            ctx.fillRect(bx, by, Math.min(ps,W-bx), Math.min(ps,H-by));
          }
        }
      }
    }
    ctx.restore();
  }
}

// ─── Preview component ──────────────────────────────────────────
// ─── Font loader ─────────────────────────────────────────────
let fontReady = false;
try {
  document.fonts.ready.then(() => { fontReady = true; });
  setTimeout(() => { fontReady = true; }, 2000); // Fallback: proceed after 2s even if fonts fail
} catch(e) { fontReady = true; }

function CanvasPreview({ config, size, scale, exportRef }) {
  const canvasRef = useRef(null);
  const imgRef    = useRef(null);
  const [canvasH, setCanvasH] = useState(size.h);
  if (exportRef) exportRef.current = canvasRef;

  const redraw = useCallback(() => {
    if (canvasRef.current) {
      drawCanvas(canvasRef.current, config, size, imgRef.current);
      applyMosaic(canvasRef.current, config.blurStrokes);
      setCanvasH(canvasRef.current.height);
    }
  }, [config, size]);

  // Re-render once fonts are loaded
  useEffect(() => {
    if (!fontReady) {
      const t = setInterval(() => { if (fontReady) { clearInterval(t); redraw(); } }, 200);
      return () => clearInterval(t);
    }
  }, [redraw]);

  useEffect(() => {
    if (config.photoUrl) {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => { imgRef.current = img; redraw(); };
      img.onerror = () => {
        // Retry without crossOrigin for local files
        const img2 = new Image();
        img2.onload = () => { imgRef.current = img2; redraw(); };
        img2.src = config.photoUrl;
      };
      img.src = config.photoUrl;
    } else {
      imgRef.current = null; redraw();
    }
  }, [config, size, redraw]);

  return (
    <canvas ref={canvasRef}
      style={{ width: size.w*scale, height: canvasH*scale, display:"block", borderRadius:4 }} />
  );
}

// ─── Reseller codes (전화번호 뒷자리 4자리 → 회사명) ────────────
const RESELLER_CODES = {
  "1234": { name: "디지털e세상",     logo: "" },
  "5678": { name: "영상장비나라",     logo: "" },
  "9012": { name: "프로미디어",       logo: "" },
  "3456": { name: "스튜디오킹",       logo: "" },
  "7890": { name: "비디오프로",       logo: "" },
  "3515": { name: "하이픽셀플러스",   logo: "https://raw.githubusercontent.com/hosuproduction-netizen/bmd-image-maker/main/images/hipixel-logo.png" },
  // 리셀러 추가: "전화번호뒷4자리": { name: "회사명", logo: "로고URL" }
};

// ─── Auth Gate ──────────────────────────────────────────────
function App() {
  const [authCode, setAuthCode] = useState(() => {
    try { return localStorage.getItem("bmd_auth_code") || ""; } catch(e) { return ""; }
  });
  const [authInput, setAuthInput] = useState("");
  const [authError, setAuthError] = useState("");

  const isAuthed = !!RESELLER_CODES[authCode];
  const resellerName = RESELLER_CODES[authCode]?.name || "";
  const resellerLogo = RESELLER_CODES[authCode]?.logo || "";

  const handleLogin = () => {
    const code = authInput.trim().replace(/[^0-9]/g, "");
    if (RESELLER_CODES[code]) {
      setAuthCode(code);
      try { localStorage.setItem("bmd_auth_code", code); } catch(e) {}
      setAuthError("");
    } else {
      setAuthError("등록되지 않은 번호입니다. 하이픽셀플러스에 문의해주세요.");
    }
  };

  const handleLogout = () => {
    setAuthCode("");
    try { localStorage.removeItem("bmd_auth_code"); } catch(e) {}
  };

  if (!isAuthed) {
    return (
      <div style={{ height:"100vh", display:"flex", alignItems:"center", justifyContent:"center",
        background:"#111", fontFamily:"Pretendard, 'Noto Sans KR', sans-serif" }}>
        <div style={{ width:420, padding:"48px 40px", background:"#fff", borderRadius:16,
          boxShadow:"0 20px 60px rgba(0,0,0,0.3)", textAlign:"center" }}>
          <div style={{ marginBottom:8 }}>
            <div style={{ width:8, height:8, background:"#111", borderRadius:"50%", display:"inline-block", marginRight:10 }}/>
            <span style={{ fontWeight:800, fontSize:16, letterSpacing:"0.12em" }}>BLACKMAGIC DESIGN</span>
          </div>
          <div style={{ fontSize:14, color:"#999", marginBottom:32 }}>리셀러 이미지 메이커</div>
          <div style={{ fontSize:18, fontWeight:700, color:"#333", marginBottom:8 }}>리셀러 전용</div>
          <div style={{ fontSize:14, color:"#888", marginBottom:28 }}>
            등록된 전화번호 뒷자리 4자리를 입력해주세요
          </div>
          <input value={authInput}
            onChange={e => { setAuthInput(e.target.value.replace(/[^0-9]/g, "").slice(0,4)); setAuthError(""); }}
            onKeyDown={e => e.key === "Enter" && handleLogin()}
            placeholder="0000"
            inputMode="numeric"
            maxLength={4}
            style={{ width:"100%", padding:"18px 20px", fontSize:32, fontWeight:700,
              borderRadius:10, border:"2px solid #ddd", outline:"none", textAlign:"center",
              letterSpacing:"0.3em", marginBottom:12 }}/>
          {authError && (
            <div style={{ fontSize:13, color:"#e05555", marginBottom:12, padding:"8px",
              background:"#fff0f0", borderRadius:6 }}>{authError}</div>
          )}
          <button onClick={handleLogin}
            disabled={authInput.length < 4}
            style={{ width:"100%", padding:"16px 0", borderRadius:10, border:"none",
              background: authInput.length >= 4 ? "#111" : "#ccc", color:"#fff", fontSize:16, fontWeight:800,
              cursor: authInput.length >= 4 ? "pointer" : "default", letterSpacing:"0.05em" }}>
            입장하기
          </button>
          <div style={{ marginTop:24, fontSize:12, color:"#bbb", lineHeight:1.8 }}>
            등록되지 않은 경우<br/>
            하이픽셀플러스에 문의해주세요
          </div>
        </div>
      </div>
    );
  }

  return <MainApp resellerName={resellerName} resellerLogo={resellerLogo} handleLogout={handleLogout} resellerId={authCode} />;
}

// ─── Main App ────────────────────────────────────────────────
function MainApp({ resellerName, resellerLogo, handleLogout, resellerId }) {
  const [pasteHint, setPasteHint] = useState(false);
  const [size,     setSize]     = useState(SIZES[0]);
  const [fmt,      setFmt]      = useState("png");
  const [customColors, setCustomColors] = useState([]);
  const [summarizing, setSummarizing] = useState(false);
  const [collapsed, setCollapsed] = useState({ photo:false, font:false, pos:false, layout:true });
  const [showApiKeyModal, setShowApiKeyModal] = useState(false);
  const [apiKey, setApiKey] = useState(() => {
    try { return localStorage.getItem("bmd_gemini_api_key") || ""; } catch(e) { return ""; }
  });
  const [apiKeyInput, setApiKeyInput] = useState("");
  const colorPickerRef = useRef(null);

  // ── 검수 요청 state ──
  const [showSubmitModal, setShowSubmitModal] = useState(false);
  const [submitNote,      setSubmitNote]      = useState("");
  const [submitting,      setSubmitting]      = useState(false);
  const [submitDone,      setSubmitDone]      = useState(false);
  const [mySubmissions,   setMySubmissions]   = useState([]);

  // ── Slide system ──
  const defaultSlide = (overrides={}) => ({
    id: Date.now() + Math.random(),
    photoUrl: null,
    headline:  "",
    body:      "본문을 입력하세요.",
    badge:     "",
    imgScale:  1, imgOffsetX: 0, imgOffsetY: 0,
    blurStrokes: [],
    headPos: null, bodyPos: null, // {x:0-1, y:0-1} for free positioning
    ...overrides,
  });

  const [slides,       setSlides]       = useState([defaultSlide({
    photoUrl: "https://raw.githubusercontent.com/hosuproduction-netizen/bmd-image-maker/main/images/sample.jpg",
    headline: "SSD? 이제 안녕. 👋",
    body: "HyperDeck에서 Cloud Store Max로 바로 쏘세요.\n네트워크 연결만으로 여러 대 동시 녹화 완료!\n복잡했던 멀티캠 워크플로우,\n이제 다이렉트 레코딩으로 단순하게 정복하세요.",
    badge: "",
  })]);
  const [activeSlide,  setActiveSlide]  = useState(0);

  // Load saved company name
  const savedCompany = (() => { try { return localStorage.getItem("bmd_company") || ""; } catch(e) { return ""; } })();

  // Shared settings across all slides
  const [shared, setShared] = useState({
    photoRatio: 0.60, showBranding: true, accentColor: "#ffffff",
    company: savedCompany || resellerName || "하이픽셀플러스", headSizeScale: 1, bodySizeScale: 1,
    textGap: 1, textVAlign: 0, bodyLineHeight: 1,
    layout: "split", overlayStart: 0.35, textPadX: 0.08,
    showBadge: false, textAlign: "center", freePos: false,
  });

  // Save company name to localStorage
  useEffect(() => {
    try { localStorage.setItem("bmd_company", shared.company); } catch(e) {}
  }, [shared.company]);

  const slide    = slides[activeSlide] ?? slides[0];
  const photoUrl = slide.photoUrl;
  const setPhotoUrl = (url) => updateSlide({ photoUrl: url });
  const cfg = { ...shared, ...slide };

  const updateSlide = (patch) => {
    setSlides(prev => prev.map((s, i) => i === activeSlide ? { ...s, ...patch } : s));
  };
  const setCfg = (valOrFn) => {
    if (typeof valOrFn === "function") {
      setSlides(prev => prev.map((s, i) => {
        if (i !== activeSlide) return s;
        const next = valOrFn({ ...shared, ...s });
        // split shared vs slide keys
        const sharedKeys = Object.keys(shared);
        const sharedPatch = {}, slidePatch = {};
        Object.entries(next).forEach(([k,v]) => {
          if (sharedKeys.includes(k)) sharedPatch[k] = v; else slidePatch[k] = v;
        });
        setShared(sh => ({ ...sh, ...sharedPatch }));
        return { ...s, ...slidePatch };
      }));
    } else {
      const sharedKeys = Object.keys(shared);
      const sharedPatch = {}, slidePatch = {};
      Object.entries(valOrFn).forEach(([k,v]) => {
        if (sharedKeys.includes(k)) sharedPatch[k] = v; else slidePatch[k] = v;
      });
      if (Object.keys(sharedPatch).length) setShared(sh => ({ ...sh, ...sharedPatch }));
      if (Object.keys(slidePatch).length)  updateSlide(slidePatch);
    }
  };

  const addSlide = () => {
    const newSlide = defaultSlide();
    setSlides(prev => [...prev, newSlide]);
    setActiveSlide(slides.length);
  };

  const duplicateSlide = () => {
    const copy = { ...slide, id: Date.now() + Math.random() };
    setSlides(prev => [...prev.slice(0, activeSlide+1), copy, ...prev.slice(activeSlide+1)]);
    setActiveSlide(activeSlide + 1);
  };

  const deleteSlide = (idx) => {
    if (slides.length === 1) return;
    setSlides(prev => prev.filter((_, i) => i !== idx));
    setActiveSlide(Math.min(activeSlide, slides.length - 2));
  };

  const fileRef    = useRef(null);
  const exportRef  = useRef(null);
  const dragAreaRef = useRef(null);
  const dragState  = useRef(null);
  const [isDragging, setIsDragging] = useState(false);
  const [blurMode, setBlurMode] = useState(false);
  const [brushSize, setBrushSize] = useState(40);
  const blurStrokeRef = useRef(null); // current stroke being painted

  // Extract clientX/clientY from mouse or touch event
  const getPointer = (e) => {
    if (e.touches && e.touches.length > 0) return { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY };
    if (e.changedTouches && e.changedTouches.length > 0) return { clientX: e.changedTouches[0].clientX, clientY: e.changedTouches[0].clientY };
    return { clientX: e.clientX, clientY: e.clientY };
  };

  // Convert event to full-resolution canvas coordinates
  const toCanvasCoords = (e) => {
    const rect = dragAreaRef.current?.getBoundingClientRect();
    if (!rect) return null;
    const p = getPointer(e);
    const canvasEl = exportRef.current?.current;
    const cW = canvasEl ? canvasEl.width : size.w;
    const cH = canvasEl ? canvasEl.height : size.h;
    const x = (p.clientX - rect.left) / rect.width * cW;
    const y = (p.clientY - rect.top) / rect.height * cH;
    return { x, y, cW, cH };
  };

  const textDragRef = useRef(null); // {target:"head"|"body", startX, startY, origX, origY}

  const onDragStart = (e) => {
    if (e.touches) e.preventDefault();
    const p = getPointer(e);

    // Blur mode
    if (blurMode) {
      const pt = toCanvasCoords(e);
      if (!pt) return;
      setIsDragging(true);
      const r = brushSize / 100 * size.w;
      blurStrokeRef.current = [{ x: pt.x, y: pt.y, r }];
      updateSlide({ blurStrokes: [...(slide.blurStrokes||[]), blurStrokeRef.current] });
      return;
    }

    // Free position mode: drag text blocks
    if (cfg.freePos) {
      const pt = toCanvasCoords(e);
      if (!pt) return;
      // Determine which block: top half = head, bottom half = body
      const headY = slide.headPos ? slide.headPos.y * pt.cH : pt.cH * 0.5;
      const bodyY = slide.bodyPos ? slide.bodyPos.y * pt.cH : pt.cH * 0.7;
      const distHead = Math.abs(pt.y - headY);
      const distBody = Math.abs(pt.y - bodyY);
      const target = distHead <= distBody ? "head" : "body";
      const pos = target === "head" ? slide.headPos : slide.bodyPos;
      setIsDragging(true);
      textDragRef.current = {
        target,
        startX: p.clientX, startY: p.clientY,
        origX: pos ? pos.x : 0.5,
        origY: pos ? pos.y : (target === "head" ? 0.5 : 0.7),
      };
      return;
    }

    // Normal image drag
    if (!photoUrl) return;
    setIsDragging(true);
    dragState.current = {
      startX: p.clientX,
      startY: p.clientY,
      startOX: cfg.imgOffsetX,
      startOY: cfg.imgOffsetY,
    };
  };

  const onDragMove = (e) => {
    if (e.touches) e.preventDefault();

    // Blur mode
    if (blurMode && isDragging && blurStrokeRef.current) {
      const pt = toCanvasCoords(e);
      if (!pt) return;
      const r = brushSize / 100 * size.w;
      blurStrokeRef.current.push({ x: pt.x, y: pt.y, r });
      const strokes = [...(slide.blurStrokes||[])];
      strokes[strokes.length - 1] = [...blurStrokeRef.current];
      updateSlide({ blurStrokes: strokes });
      return;
    }

    // Free position text drag
    if (textDragRef.current && isDragging) {
      const { target, startX, startY, origX, origY } = textDragRef.current;
      const rect = dragAreaRef.current?.getBoundingClientRect();
      if (!rect) return;
      const p = getPointer(e);
      const dx = (p.clientX - startX) / rect.width;
      const dy = (p.clientY - startY) / rect.height;
      const newPos = {
        x: Math.max(0, Math.min(1, origX + dx)),
        y: Math.max(0, Math.min(1, origY + dy)),
      };
      if (target === "head") updateSlide({ headPos: newPos });
      else updateSlide({ bodyPos: newPos });
      return;
    }

    // Normal image drag
    if (!dragState.current) return;
    const { startX, startY, startOX, startOY } = dragState.current;
    const rect = dragAreaRef.current?.getBoundingClientRect();
    if (!rect) return;
    const p = getPointer(e);
    const dx = (p.clientX - startX) / rect.width  * 2;
    const dy = (p.clientY - startY) / rect.height * 2;
    setCfg(prev => ({
      ...prev,
      imgOffsetX: Math.max(-1, Math.min(1, startOX - dx)),
      imgOffsetY: Math.max(-1, Math.min(1, startOY - dy)),
    }));
  };

  const onDragEnd = () => {
    dragState.current = null;
    blurStrokeRef.current = null;
    textDragRef.current = null;
    setIsDragging(false);
  };
  const [urlInput,   setUrlInput]   = useState("");
  const [urlError,   setUrlError]   = useState("");
  const [photoMode,  setPhotoMode]  = useState("upload"); // "upload" | "url"

  const handleFile = (e) => {
    const f = e.target.files[0]; if (!f) return;
    loadImageFile(f);
  };

  const loadImageFile = (file) => {
    if (!file || !file.type.startsWith("image/")) return;
    const r = new FileReader();
    r.onload = ev => { setPhotoUrl(ev.target.result); setUrlError(""); setPasteHint(false); };
    r.readAsDataURL(file);
  };

  // Global paste listener (Ctrl+V / Cmd+V anywhere on page)
  useEffect(() => {
    const onPaste = (e) => {
      // Skip if typing in input/textarea
      const tag = document.activeElement?.tagName;
      if (tag === "INPUT" || tag === "TEXTAREA") return;

      const items = e.clipboardData?.items;
      if (!items) return;

      // 1. Try direct image data first
      for (const item of items) {
        if (item.type.startsWith("image/")) {
          loadImageFile(item.getAsFile());
          return;
        }
      }

      // 2. Try HTML (some sites copy images as HTML <img>)
      const html = e.clipboardData.getData("text/html");
      if (html) {
        const match = html.match(/<img[^>]+src=["']([^"']+)["']/i);
        if (match && match[1]) {
          tryLoadImageUrl(match[1]);
          return;
        }
      }

      // 3. Try plain text URL
      const text = e.clipboardData.getData("text/plain")?.trim();
      if (text && /^https?:\/\/.+\.(jpg|jpeg|png|webp|gif)/i.test(text)) {
        tryLoadImageUrl(text);
      }
    };

    window.addEventListener("paste", onPaste);
    return () => window.removeEventListener("paste", onPaste);
  }, []);

  const tryLoadImageUrl = (url) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => setPhotoUrl(url);
    img.onerror = () => {
      // Try CORS proxy
      const proxyUrl = `https://corsproxy.io/?url=${encodeURIComponent(url)}`;
      const img2 = new Image();
      img2.crossOrigin = "anonymous";
      img2.onload = () => setPhotoUrl(proxyUrl);
      img2.onerror = () => {
        // Last resort: use directly without crossOrigin (will work for display but not export)
        setPhotoUrl(url);
      };
      img2.src = proxyUrl;
    };
    img.src = url;
  };

  // ── Undo history (cfg only, not text fields)
  const historyRef = useRef([]);          // stack of past cfg snapshots
  const isUndoingRef = useRef(false);

  // Push to history whenever cfg changes (skip text fields — they have native undo)
  const prevCfgRef = useRef(cfg);
  useEffect(() => {
    if (isUndoingRef.current) return;
    const prev = prevCfgRef.current;
    const curr = cfg;
    // Only track non-text changes (sliders, toggles, colors)
    const nonTextKeys = ["photoRatio","showBranding","accentColor","imgScale",
      "imgOffsetX","imgOffsetY","headSizeScale","bodySizeScale",
      "textGap","textVAlign","bodyLineHeight","layout","overlayStart","textPadX","showBadge","textAlign","freePos"];
    const changed = nonTextKeys.some(k => prev[k] !== curr[k]);
    if (changed) {
      historyRef.current.push(prev);
      if (historyRef.current.length > 50) historyRef.current.shift();
    }
    prevCfgRef.current = curr;
  }, [cfg]);

  // Ctrl+Z: undo cfg when textarea/input is NOT focused
  useEffect(() => {
    const onKeyDown = (e) => {
      if (!(e.key === "z" && (e.ctrlKey || e.metaKey))) return;
      const tag = document.activeElement?.tagName;
      if (tag === "INPUT" || tag === "TEXTAREA") return; // let native undo handle it
      e.preventDefault();
      if (historyRef.current.length === 0) return;
      isUndoingRef.current = true;
      const prev = historyRef.current.pop();
      setCfg(c => ({ ...c, ...prev }));
      setTimeout(() => { isUndoingRef.current = false; }, 0);
    };
    window.addEventListener("keydown", onKeyDown);
    return () => window.removeEventListener("keydown", onKeyDown);
  }, []);

  const handleUrlLoad = () => {
    const url = urlInput.trim();
    if (!url) return;
    setUrlError("⏳ 불러오는 중...");

    const proxies = [
      url,
      `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
      `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
      `https://cors-anywhere.herokuapp.com/${url}`,
    ];

    let idx = 0;
    const tryNext = () => {
      if (idx >= proxies.length) {
        setUrlError("모든 방법으로 불러오기 실패했습니다.\n→ 이미지를 PC에 저장 후 '파일 업로드' 탭을 이용해 주세요.");
        return;
      }
      const src = proxies[idx++];
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload  = () => { setPhotoUrl(src); setUrlError(""); };
      img.onerror = () => tryNext();
      img.src = src;
    };

    tryNext();
  };

  // ── Copyright metadata injection ──
  const injectMetadata = (dataUrl, mime) => {
    try {
      const copy = cfg.company || "하이픽셀플러스";
      const year = new Date().getFullYear();
      const xmpStr = [
        '<?xpacket begin="\uFEFF" id="W5M0MpCehiHzreSzNTczkc9d"?>',
        '<x:xmpmeta xmlns:x="adobe:ns:meta/">',
        '<rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#">',
        '<rdf:Description',
        ' xmlns:dc="http://purl.org/dc/elements/1.1/"',
        ' xmlns:xmpRights="http://ns.adobe.com/xap/1.0/rights/"',
        ' xmlns:photoshop="http://ns.adobe.com/photoshop/1.0/">',
        `<dc:rights><rdf:Alt><rdf:li xml:lang="x-default">© ${year} ${copy}. All rights reserved. Created with BMD 리셀러 이미지 메이커</rdf:li></rdf:Alt></dc:rights>`,
        `<dc:creator><rdf:Seq><rdf:li>${copy}</rdf:li></rdf:Seq></dc:creator>`,
        `<xmpRights:Marked>True</xmpRights:Marked>`,
        `<photoshop:Credit>${copy} - Blackmagic Design Authorized Reseller</photoshop:Credit>`,
        '</rdf:Description>',
        '</rdf:RDF>',
        '</x:xmpmeta>',
        '<?xpacket end="w"?>',
      ].join('\n');

      const bin = atob(dataUrl.split(',')[1]);
      const arr = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);

      if (mime === "image/jpeg") {
        const xmpPayload = new TextEncoder().encode('http://ns.adobe.com/xap/1.0/\0' + xmpStr);
        const segLen = xmpPayload.length + 2;
        const segment = new Uint8Array(4 + xmpPayload.length);
        segment[0] = 0xFF; segment[1] = 0xE1;
        segment[2] = (segLen >> 8) & 0xFF; segment[3] = segLen & 0xFF;
        segment.set(xmpPayload, 4);
        const result = new Uint8Array(2 + segment.length + arr.length - 2);
        result.set(arr.subarray(0, 2));
        result.set(segment, 2);
        result.set(arr.subarray(2), 2 + segment.length);
        return URL.createObjectURL(new Blob([result], { type: mime }));
      } else {
        const copyright = `© ${year} ${copy}. Blackmagic Design Authorized Reseller`;
        const key = new TextEncoder().encode('Copyright');
        const val = new TextEncoder().encode(copyright);
        const chunkData = new Uint8Array(key.length + 1 + val.length);
        chunkData.set(key); chunkData[key.length] = 0; chunkData.set(val, key.length + 1);
        const typeBytes = new Uint8Array([0x74,0x45,0x58,0x74]); // tEXt
        const crcTable = (() => { const t = []; for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=c&1?0xEDB88320^(c>>>1):c>>>1;t[n]=c;}return t;})();
        const crcInput = new Uint8Array(4 + chunkData.length);
        crcInput.set(typeBytes); crcInput.set(chunkData, 4);
        let c = 0xFFFFFFFF; for(let i=0;i<crcInput.length;i++) c=crcTable[(c^crcInput[i])&0xFF]^(c>>>8); c=(c^0xFFFFFFFF)>>>0;
        const chunk = new Uint8Array(12 + chunkData.length);
        const dv = new DataView(chunk.buffer);
        dv.setUint32(0, chunkData.length);
        chunk.set(typeBytes, 4);
        chunk.set(chunkData, 8);
        dv.setUint32(8 + chunkData.length, c);
        const result = new Uint8Array(arr.length + chunk.length);
        result.set(arr.subarray(0, arr.length - 12));
        result.set(chunk, arr.length - 12);
        result.set(arr.subarray(arr.length - 12), arr.length - 12 + chunk.length);
        return URL.createObjectURL(new Blob([result], { type: mime }));
      }
    } catch(e) {
      console.warn("Metadata injection failed, using raw image:", e);
      return dataUrl;
    }
  };

  const download = () => {
    const canvas = exportRef.current?.current;
    if (!canvas) return;
    try {
      const ext = fmt === "jpeg" ? "jpg" : "png";
      const mime = fmt === "jpeg" ? "image/jpeg" : "image/png";
      const dataUrl = fmt === "jpeg" ? canvas.toDataURL(mime, 0.95) : canvas.toDataURL(mime);
      const blobUrl = injectMetadata(dataUrl, mime);
      const a = document.createElement("a");
      a.download = `bmd-slide${activeSlide+1}-${size.id}.${ext}`;
      a.href = blobUrl; a.click();
      setTimeout(() => { try { URL.revokeObjectURL(blobUrl); } catch(e){} }, 1000);
    } catch(e) {
      alert("저장에 실패했습니다. 사진을 다시 업로드해주세요.\n(외부 URL 이미지는 직접 다운로드 후 업로드하면 저장 가능합니다)");
    }
  };

  const downloadAll = async () => {
    const ext = fmt === "jpeg" ? "jpg" : "png";

  const GEMINI_ENDPOINT = (key) =>
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;

  const GEMINI_PROMPT = (inputText) => `당신은 Blackmagic Design 전문 마케팅 카피라이터입니다.
아래 텍스트를 분석하여 인스타그램 카드 이미지용 제목과 본문을 작성하세요.

<rules>
- 제품명·브랜드명은 반드시 영어 원문 유지 (Blackmagic Camera, DaVinci Resolve, PYXIS, HyperDeck, Blackmagic Cloud 등)
- 제목: 15자 이내, 핵심 키워드 중심, 임팩트 있게
- 본문: 정확히 5줄, 줄당 20~30자, 핵심 기능·장점 중심
- 한국어 마케팅 톤 (전문적이고 간결하게)
- 이모지·불필요한 수식어 금지
</rules>

<output_format>
[제목] 여기에 제목
[본문]
첫째 줄
둘째 줄
셋째 줄
넷째 줄
다섯째 줄
</output_format>

<input>
${inputText}
</input>

위 output_format 형식만 출력하세요. 다른 설명 없이.`;

  const callGeminiWithRetry = async (inputText, maxRetry = 3) => {
    const WAIT_SEC = 7;
    for (let attempt = 0; attempt < maxRetry; attempt++) {
      if (attempt > 0) {
        const waitSec = WAIT_SEC * Math.pow(2, attempt - 1); // 7s → 14s → 28s
        for (let i = waitSec; i > 0; i--) {
          setSummarizing(`재시도 중... (${i}초 대기)`);
          await new Promise(r => setTimeout(r, 1000));
        }
        setSummarizing("재시도 중...");
      }
      const response = await fetch(GEMINI_ENDPOINT(apiKey), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: GEMINI_PROMPT(inputText) }] }],
          generationConfig: {
            maxOutputTokens: 1024,
            temperature: 0.7,
            thinkingConfig: { thinkingBudget: 0 },
          },
        }),
      });
      if (response.status === 429) {
        if (attempt === maxRetry - 1) throw new Error("요청 한도 초과입니다. 잠시 후 다시 시도해주세요.");
        continue; // 다음 루프에서 대기 후 재시도
      }
      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        if (response.status === 400 || response.status === 403) {
          throw new Error("AUTH_ERROR");
        }
        throw new Error(errData.error?.message || `API 오류 (${response.status})`);
      }
      return await response.json();
    }
  };

  const handleSummarize = async () => {
    const headText = cfg.headline?.trim() || "";
    const bodyText = cfg.body?.trim() || "";
    const inputText = [headText, bodyText].filter(Boolean).join("\n");
    if (!inputText || inputText === "본문을 입력하세요.") {
      alert("요약할 텍스트를 제목이나 본문에 입력해주세요.");
      return;
    }
    if (!apiKey) {
      setApiKeyInput("");
      setShowApiKeyModal(true);
      return;

    setSummarizing("AI가 분석 중...");
    try {
      // 연속 요청 방지: 이전 요청 후 7초 경과 여부 체크
      const now = Date.now();
      const lastCall = handleSummarize._lastCall || 0;
      const elapsed = now - lastCall;
      if (elapsed < 7000 && lastCall > 0) {
        const remain = Math.ceil((7000 - elapsed) / 1000);
        for (let i = remain; i > 0; i--) {
          setSummarizing(`잠시 대기 중 (${i}초)...`);
          await new Promise(r => setTimeout(r, 1000));
        }
      }
      handleSummarize._lastCall = Date.now();

      setSummarizing("AI가 분석 중...");
      const data = await callGeminiWithRetry(inputText);
      const result = data?.candidates?.[0]?.content?.parts?.[0]?.text;
      if (result) {
        const headlineMatch = result.match(/\[제목\]\s*(.+)/);
        const bodyMatch = result.match(/\[본문\]\s*\n([\s\S]+)/);
        const newHeadline = headlineMatch ? headlineMatch[1].trim() : "";
        const newBody = bodyMatch ? bodyMatch[1].trim() : result.trim();
        const patch = { body: newBody };
        if (newHeadline) patch.headline = newHeadline;
        setCfg({...cfg, ...patch});
      } else {
        alert("요약 결과를 받지 못했습니다. 다시 시도해주세요.");
      }
    } catch (err) {
      console.error("AI 요약 오류:", err);
      if (err.message === "AUTH_ERROR") {
        alert("API 키가 유효하지 않거나 권한이 없습니다.\n설정에서 다시 입력해주세요.");

        setShowApiKeyModal(true);
      } else {
        alert("AI 요약 오류:\n" + err.message);
      }
    } finally {
      setSummarizing(false);
    }
  };

  const generateThumbnail = (slideData, sharedData) => new Promise(resolve => {
    const canvas = document.createElement("canvas");
    const thumbW = 360;
    const sc = thumbW / size.w;
    const loadAndDraw = (imgEl) => {
      drawCanvas(canvas, { ...sharedData, ...slideData }, size, imgEl);
      applyMosaic(canvas, slideData.blurStrokes || []);
      const tc = document.createElement("canvas");
      tc.width = thumbW;
      tc.height = Math.round(canvas.height * sc);
      tc.getContext("2d").drawImage(canvas, 0, 0, tc.width, tc.height);
      resolve(tc.toDataURL("image/jpeg", 0.65));
    };
    if (slideData.photoUrl) {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => loadAndDraw(img);
      img.onerror = () => loadAndDraw(null);
      img.src = slideData.photoUrl;
    } else { loadAndDraw(null); }
  });

              {mySubmissions.length > 0 && (
                <div style={{ marginBottom:20, padding:"14px 16px", background:"#f8f8f8",
                  borderRadius:10, border:"1px solid #eee" }}>
                  <div style={{ fontSize:12, fontWeight:700, color:"#666",
                    marginBottom:10, letterSpacing:"0.06em" }}>
                    최근 검수 현황
                  </div>
                  {mySubmissions.slice(0,3).map(sub => {
                    const si = {
                      pending:   { label:"검수 대기", color:"#d97706", bg:"#fffbeb" },
                      revision:  { label:"수정 요청", color:"#dc2626", bg:"#fef2f2" },
                      confirmed: { label:"컨펌 완료", color:"#16a34a", bg:"#f0fdf4" },
                    }[sub.status] || { label:"대기", color:"#999", bg:"#f5f5f5" };
                    const d = sub.submittedAt?.toDate ? sub.submittedAt.toDate() : new Date();
                    const da = Math.floor((Date.now() - d) / 86400000);
                    return (
                      <div key={sub.id} style={{ display:"flex", alignItems:"center", gap:10,
                        padding:"8px 0", borderBottom:"1px solid #eee" }}>
                        <span style={{ fontSize:11, padding:"3px 8px", borderRadius:20,
                          background:si.bg, color:si.color, fontWeight:700, flexShrink:0 }}>
                          {si.label}
                        </span>
                        <span style={{ fontSize:12, color:"#555", flex:1 }}>
                          슬라이드 {sub.slideCount || sub.slides?.length || 1}장
                        </span>
                        <span style={{ fontSize:11, color:"#bbb" }}>
                          {da === 0 ? "오늘" : `${da}일 전`}
                        </span>
                        {sub.adminComment && sub.status === "revision" && (
                          <span style={{ fontSize:11, color:"#dc2626", maxWidth:130,
                            overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                            💬 {sub.adminComment}
                          </span>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}

              <div style={{ fontSize:13, color:"#555", fontWeight:600, marginBottom:8 }}>
                메모 <span style={{ fontWeight:400, color:"#aaa" }}>(선택사항)</span>
              </div>
              <textarea value={submitNote}
                onChange={e => setSubmitNote(e.target.value)}
                placeholder="담당자에게 전달할 내용을 입력하세요.&#10;(예: 2번 슬라이드 배경 이미지 추후 교체 예정)"
                rows={3}
                style={{ width:"100%", padding:"12px 14px", fontSize:13, borderRadius:8,
                  border:"2px solid #e0e0e0", fontFamily:"Pretendard, 'Noto Sans KR', sans-serif",
                  resize:"none", marginBottom:20, lineHeight:1.65, outline:"none" }}/>
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={handleSubmitReview} disabled={submitting}
                  style={{ flex:1, padding:"14px 0", borderRadius:8, border:"none",
                    background: submitting ? "#ccc" : "#f97316", color:"#fff",
                    fontSize:15, fontWeight:800, cursor: submitting ? "default" : "pointer" }}>
                  {submitting ? "⏳ 제출 중..." : "📤 검수 요청 보내기"}
                </button>
                <button onClick={() => { if (!submitting) setShowSubmitModal(false); }}
                  style={{ padding:"14px 20px", borderRadius:8, border:"1px solid #ddd",
                    background:"#f5f5f5", color:"#888", fontSize:14, cursor:"pointer" }}>
                  취소
                </button>
              </div>
            </>)}
          </div>
        </div>
      )}
      {/* ── API Key Modal ── */}
      {showApiKeyModal && (
        <div style={{ position:"fixed", inset:0, zIndex:9999, background:"rgba(0,0,0,0.5)",
          display:"flex", alignItems:"center", justifyContent:"center" }}
          onClick={(e) => { if (e.target === e.currentTarget) setShowApiKeyModal(false); }}>
          <div style={{ width:440, background:"#fff", borderRadius:16, padding:"36px 32px",
            boxShadow:"0 20px 60px rgba(0,0,0,0.3)" }}>
            <div style={{ fontSize:18, fontWeight:800, color:"#333", marginBottom:6 }}>
              ✨ AI 요약 — API 키 설정
            </div>
            <div style={{ fontSize:13, color:"#888", marginBottom:20, lineHeight:1.7 }}>
              Google Gemini API 키를 입력하면 제품 설명을<br/>
              인스타그램 카드용 본문으로 자동 요약할 수 있습니다.<br/>
              <span style={{ color:"#16a34a", fontWeight:600 }}>무료 티어로 하루 1,000건까지 사용 가능합니다.</span>
            </div>
            <div style={{ fontSize:12, color:"#666", marginBottom:8, fontWeight:600 }}>Google Gemini API Key</div>
            <input value={apiKeyInput}
              onChange={e => setApiKeyInput(e.target.value)}
              onKeyDown={e => e.key === "Enter" && saveApiKey()}
              placeholder="AIza..."
              type="password"
              style={{ width:"100%", padding:"14px 16px", fontSize:14, borderRadius:8,
                border:"2px solid #ddd", outline:"none", marginBottom:12,
                fontFamily:"monospace" }}/>
            <div style={{ fontSize:11, color:"#aaa", marginBottom:20, lineHeight:1.6 }}>
              키는 이 브라우저의 localStorage에만 저장됩니다.<br/>
              <a href="https://aistudio.google.com/apikey" target="_blank"
                style={{ color:"#6366f1" }}>Google AI Studio</a>에서 무료로 발급받을 수 있습니다.
            </div>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={saveApiKey}
                style={{ flex:1, padding:"14px 0", borderRadius:8, border:"none",
                  background:"#111", color:"#fff", fontSize:15, fontWeight:700, cursor:"pointer" }}>
                저장
              </button>
              {apiKey && (
                <button onClick={clearApiKey}
                  style={{ padding:"14px 20px", borderRadius:8, border:"1px solid #ffcccc",
                    background:"#fff0f0", color:"#e05555", fontSize:14, fontWeight:600, cursor:"pointer" }}>
                  삭제
                </button>
              )}
              <button onClick={() => setShowApiKeyModal(false)}
                style={{ padding:"14px 20px", borderRadius:8, border:"1px solid #ddd",
                  background:"#f5f5f5", color:"#888", fontSize:14, cursor:"pointer" }}>
                닫기
              </button>
            </div>
          </div>
        </div>
      )}
      <style>{`* { box-sizing:border-box; margin:0; padding:0; }
        input, textarea { outline:none !important; }
        input[type="range"] { height:8px; cursor:pointer; }
        input[type="range"]::-webkit-slider-thumb { width:20px; height:20px; }
        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-track { background:#f0f0f0; }
        ::-webkit-scrollbar-thumb { background:#bbb; border-radius:3px; }`}
      </style>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
