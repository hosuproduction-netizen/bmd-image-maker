<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const SIZES = [
  { id: "card",   label: "카드 4:5",    w: 1080, h: 1350  },
];

const ACCENTS = [
  { id: "white",  hex: "#ffffff", label: "화이트" },
  { id: "yellow", hex: "#f5c518", label: "골드"   },
  { id: "cyan",   hex: "#00d4ff", label: "시안"   },
  { id: "red",    hex: "#ff3b3b", label: "레드"   },
];

// ─── 프리셋 ─────────────────────────────────────────────────────
const PRESETS = [
  {
    id: "custom2",
    label: "커스텀 1",
    values: {
      layout: "split",
      imgScale: 1, imgOffsetX: 0, imgOffsetY: 0,
      headSizeScale: 1.50,
      bodySizeScale: 1.05, bodyLineHeight: 1.0, textGap: 0,

    },
  },
  {
    id: "custom1",
    label: "커스텀 2",
    values: {
      layout: "overlay",
      imgScale: 1, imgOffsetX: 0, imgOffsetY: 0,
      headSizeScale: 1.25,
      bodySizeScale: 0.70, bodyLineHeight: 0.9, textGap: 0,
      textAlign: "left", textVAlign: 0.9, textPadX: 0.02,
    },
  },
  
];

// ─── helpers ────────────────────────────────────────────────────
function wrapText(ctx, text, maxW) {
  const paragraphs = text.split("\n");
  const lines = [];
  for (const para of paragraphs) {
    if (!para.trim()) { lines.push(""); continue; }
    const words = para.split(" ");
    let cur = "";
    for (const w of words) {
      const test = cur ? cur + " " + w : w;
      if (ctx.measureText(test).width > maxW && cur) { lines.push(cur); cur = w; }
      else { cur = test; }
    }
    if (cur) lines.push(cur);
  }
  return lines;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function calcBounds(config, size) {
  const W = size.w, H = size.h;
  const layout = config.layout || "split";
  const pad = W * (config.textPadX ?? 0.08);
  const tmp = document.createElement("canvas");
  tmp.width = W; tmp.height = H;
  const ctx = tmp.getContext("2d");

  const measureLines = (lines, font) => {
    let maxW = 0;
    lines.forEach(l => { ctx.font = font; maxW = Math.max(maxW, ctx.measureText(l).width); });
    return maxW;
  };
  const getX = (w, align) => align === "left" ? pad : align === "right" ? W - pad - w : (W - w) / 2;

  if (layout === "overlay") {
    const stripH = config.showBranding ? Math.round(H * 0.042) : 0;
    let hSize = Math.round(W * 0.08 * (config.headSizeScale ?? 1));
    ctx.font = `900 ${hSize}px Pretendard, 'Noto Sans KR', sans-serif`;
    let hLines = wrapText(ctx, config.headline || "", W - pad * 2);
    let bSize = Math.round(W * 0.034 * (config.bodySizeScale ?? 1));
    ctx.font = `${bSize}px Pretendard, 'Noto Sans KR', sans-serif`;
    let bLines = wrapText(ctx, config.body || "", W - pad * 2);
    const subText = (config.showBadge && config.badge?.trim()) || "";
    const subSize = Math.round(W * 0.03 * (config.badgeScale ?? 1));
    const subH = subText ? subSize * 1.6 : 0;
    const gap = (bLines.length ? H * 0.03 : 0) * (config.textGap ?? 1);
    let hLH = hSize * 1.15, bLH = bSize * 1.55 * (config.bodyLineHeight ?? 1);
    let totalH = hLines.length * hLH, totalB = bLines.length * bLH;
    const textAreaTop = H * 0.40, usableH = H - textAreaTop - stripH - H * 0.04;
    const contentH = subH + totalH + gap + totalB;
    if (contentH > usableH && contentH > 0) {
      const r = usableH / contentH;
      hSize = Math.floor(hSize * r); bSize = Math.floor(bSize * r);
      hLH = hSize * 1.15; bLH = bSize * 1.55;
      ctx.font = `900 ${hSize}px Pretendard, 'Noto Sans KR', sans-serif`;
      hLines = wrapText(ctx, config.headline || "", W - pad * 2);
      totalH = hLines.length * hLH; totalB = bLines.length * bLH;
    }
    const freeSpace = usableH - (subH + totalH + gap + totalB);
    const topOffset = textAreaTop + freeSpace * ((config.textVAlign ?? 0.5) * 0.5 + 0.5);
    const headY = topOffset + subH, bodyY = headY + totalH + gap;
    const align = config.textAlign || "center";
    const hW = measureLines(hLines, `900 ${hSize}px Pretendard, 'Noto Sans KR', sans-serif`);
    const bW = measureLines(bLines, `${bSize}px Pretendard, 'Noto Sans KR', sans-serif`);
    return {
      canvasH: H,
      photo:    { x:0, y:0, w:W, h:H },
      headline: hLines.length ? { x:getX(hW,align)-8, y:headY-8, w:hW+16, h:totalH+16 } : null,
      body:     bLines.length ? { x:getX(bW,align)-8, y:bodyY-8, w:bW+16, h:totalB+16 } : null,
      branding: config.showBranding ? { x:0, y:H-stripH, w:W, h:stripH } : null,
    };
  }

  // Split mode
  const photoH = Math.round(H * (config.photoRatio ?? 0.60));
  const textH = Math.max(Math.round(H * 0.15), H - photoH);
  const canvasH = photoH + textH;
  const stripH = config.showBranding ? Math.round(H * 0.042) : 0;
  let hSize = Math.round(W * 0.072 * (config.headSizeScale ?? 1));
  ctx.font = `900 ${hSize}px Pretendard, 'Noto Sans KR', sans-serif`;
  let hLines = wrapText(ctx, config.headline || "", W - pad * 2);
  let bSize = Math.round(W * 0.034 * (config.bodySizeScale ?? 1));
  ctx.font = `${bSize}px Pretendard, 'Noto Sans KR', sans-serif`;
  let bLines = wrapText(ctx, config.body || "", W - pad * 2.2);
  const usableTextH = textH - stripH;
  const gap = (bLines.length ? (textH - stripH) * 0.04 : 0) * (config.textGap ?? 1);
  let hLH = hSize * 1.15, bLH = bSize * 1.55 * (config.bodyLineHeight ?? 1);
  let totalH = hLines.length * hLH, totalB = bLines.length * bLH;
  let total = totalH + gap + totalB;
  if (total > usableTextH * 0.88 && total > 0) {
    const r = (usableTextH * 0.88) / total;
    hSize = Math.max(12, Math.floor(hSize * r)); bSize = Math.max(10, Math.floor(bSize * r));
    hLH = hSize * 1.15; bLH = bSize * 1.55 * (config.bodyLineHeight ?? 1);
    ctx.font = `900 ${hSize}px Pretendard, 'Noto Sans KR', sans-serif`;
    hLines = wrapText(ctx, config.headline || "", W - pad * 2);
    ctx.font = `${bSize}px Pretendard, 'Noto Sans KR', sans-serif`;
    bLines = wrapText(ctx, config.body || "", W - pad * 2.2);
    totalH = hLines.length * hLH; totalB = bLines.length * bLH; total = totalH + gap + totalB;
  }
  const vPad = usableTextH * 0.08;
  const freeSpace = usableTextH - total;
  const topPad = vPad + (freeSpace - vPad * 2) * ((config.textVAlign ?? 0) * 0.5 + 0.5);
  const headY = photoH + topPad, bodyY = headY + totalH + gap;
  const align = config.textAlign || "center";
  const hW = measureLines(hLines, `900 ${hSize}px Pretendard, 'Noto Sans KR', sans-serif`);
  const bW = measureLines(bLines, `${bSize}px Pretendard, 'Noto Sans KR', sans-serif`);
  return {
    canvasH,
    photo:    { x:0, y:0, w:W, h:photoH },
    headline: hLines.length ? { x:getX(hW,align)-8, y:headY-8, w:hW+16, h:totalH+16 } : null,
    body:     bLines.length ? { x:getX(bW,align)-8, y:bodyY-8, w:bW+16, h:totalB+16 } : null,
    branding: config.showBranding ? { x:0, y:canvasH-stripH, w:W, h:stripH } : null,
  };
}


// ─── Logo draw helper ───────────────────────────────────────────
function drawLogo(ctx, W, canvasH, config, logoImgEl) {
  if (!logoImgEl || !config.logoUrl) return;
  const scale   = config.logoScale ?? 1;
  const opacity = config.logoOpacity ?? 1;
  const pos     = config.logoPos ?? "top-right";
  const pad     = Math.round(W * 0.04);
  const maxW    = Math.round(W * 0.18 * scale);
  const maxH    = Math.round(W * 0.09 * scale);
  const iR      = logoImgEl.width / logoImgEl.height;
  let lW, lH;
  if (iR > maxW / maxH) { lW = maxW; lH = Math.round(maxW / iR); }
  else                   { lH = maxH; lW = Math.round(maxH * iR); }
  const lX = pos.includes("right") ? W - pad - lW : pad;
  const lY = pos.includes("bottom") ? canvasH - pad - lH : pad;
  ctx.save();
  ctx.globalAlpha = opacity;
  ctx.drawImage(logoImgEl, lX, lY, lW, lH);
  ctx.restore();
}

function drawCanvas(canvas, config, size, imgEl, logoImgEl) {
  const ctx = canvas.getContext("2d");
  const W = size.w, H = size.h;

  const accent      = config.accentColor || "#ffffff";
  const pad         = W * (config.textPadX ?? 0.08);
  const layout      = config.layout || "split";

  if (layout === "overlay") {
    canvas.width = W; canvas.height = H;
    return drawOverlay(ctx, W, H, config, imgEl, accent, pad, logoImgEl);
  }

  const manualRatio = config.photoRatio ?? 0.60;
  const photoH      = Math.round(H * manualRatio);
  const minTextH    = Math.round(H * 0.15);
  const textH       = Math.max(minTextH, H - photoH);
  const canvasH     = photoH + textH;
  canvas.width = W; canvas.height = canvasH;
  const stripH      = config.showBranding ? Math.round(H*0.042) : 0;

  let hSize = Math.round(W*0.072 * (config.headSizeScale ?? 1));
  ctx.font=`900 ${hSize}px Pretendard, 'Noto Sans KR', sans-serif`;
  let hLines = wrapText(ctx, config.headline||"", W-pad*2);
  let bSize  = Math.round(W*0.034 * (config.bodySizeScale ?? 1));
  ctx.font=`${bSize}px Pretendard, 'Noto Sans KR', sans-serif`;
  let bLines = wrapText(ctx, config.body||"", W-pad*2.2);
  const gapBase = bLines.length ? (textH - stripH)*0.04 : 0;
  const gap     = gapBase * (config.textGap ?? 1);
  let hLH = hSize*1.15;
  let bLH = bSize * 1.55 * (config.bodyLineHeight ?? 1);
  let totalH = hLines.length * hLH;
  let totalB = bLines.length * bLH;
  let total  = totalH + gap + totalB;
  const usableTextH = textH - stripH;
  const maxTextSpace = usableTextH * 0.88;

  if (total > maxTextSpace && total > 0) {
    const ratio = maxTextSpace / total;
    hSize  = Math.max(12, Math.floor(hSize * ratio));
    bSize  = Math.max(10, Math.floor(bSize * ratio));
    hLH = hSize * 1.15;
    bLH = bSize * 1.55 * (config.bodyLineHeight ?? 1);
    ctx.font=`900 ${hSize}px Pretendard, 'Noto Sans KR', sans-serif`;
    hLines = wrapText(ctx, config.headline||"", W-pad*2);
    ctx.font=`${bSize}px Pretendard, 'Noto Sans KR', sans-serif`;
    bLines = wrapText(ctx, config.body||"", W-pad*2.2);
    totalH = hLines.length * hLH;
    totalB = bLines.length * bLH;
    total  = totalH + gap + totalB;
  }

  if (imgEl) {
    const iR = imgEl.width / imgEl.height, aR = W / photoH;
    let baseW, baseH;
    if (iR > aR) { baseH = photoH; baseW = photoH * iR; }
    else          { baseW = W;     baseH = W / iR; }

    const scale  = config.imgScale  ?? 1;
    const ox     = config.imgOffsetX ?? 0;
    const oy     = config.imgOffsetY ?? 0;

    const drawW = baseW * scale;
    const drawH = baseH * scale;
    const drawX = (W - drawW) / 2 + ox * (drawW - W) / 2;
    const drawY = (photoH - drawH) / 2 + oy * (drawH - photoH) / 2;

    ctx.save();
    ctx.beginPath();
    ctx.rect(0, 0, W, photoH);
    ctx.clip();
    ctx.drawImage(imgEl, drawX, drawY, drawW, drawH);
    ctx.restore();
    const fade = ctx.createLinearGradient(0, photoH*0.55, 0, photoH);
    fade.addColorStop(0,"rgba(0,0,0,0)"); fade.addColorStop(1,"rgba(0,0,0,0.55)");
    ctx.fillStyle=fade; ctx.fillRect(0,0,W,photoH);
  } else {
    ctx.fillStyle="#181818"; ctx.fillRect(0,0,W,photoH);
    ctx.fillStyle="#303030";
    ctx.font=`${Math.round(W*0.028)}px Pretendard, 'Noto Sans KR', sans-serif`;
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("📷  제품 사진을 업로드하세요", W/2, photoH/2);
  }

  ctx.fillStyle="#000"; ctx.fillRect(0,photoH,W,textH);
  ctx.fillStyle=accent+"50"; ctx.fillRect(0,photoH,W,2);

  if (config.showBadge && config.badge?.trim()) {
    const bFont = Math.round(W*0.022 * (config.badgeScale ?? 1));
    ctx.font=`bold ${bFont}px Pretendard, 'Noto Sans KR', sans-serif`;
    const bW=ctx.measureText(config.badge).width+30, bH=bFont+18;
    const bX=W/2-bW/2, bY=photoH-bH-Math.round(H*0.022);
    ctx.fillStyle="rgba(0,0,0,0.82)";
    roundRect(ctx,bX,bY,bW,bH,3); ctx.fill();
    ctx.strokeStyle="#ffffff90"; ctx.lineWidth=1.5;
    roundRect(ctx,bX,bY,bW,bH,3); ctx.stroke();
    ctx.fillStyle="#ffffff"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(config.badge, W/2, bY+bH/2);
  }

  const vPad = usableTextH * 0.08;
  const vAlign  = config.textVAlign ?? 0;
  const freeSpace = usableTextH - total;
  const topPad  = vPad + (freeSpace - vPad*2) * (vAlign * 0.5 + 0.5);
  const autoHeadY = photoH + topPad;
  const autoBodyY = autoHeadY + totalH + gap;

  const align = config.textAlign || "center";
  const autoTextX = align === "left" ? pad : align === "right" ? W - pad : W/2;

  const useFree = config.freePos;
  const headX = useFree && config.headPos ? config.headPos.x * W : autoTextX;
  const headY = useFree && config.headPos ? config.headPos.y * canvasH : autoHeadY;
  const bodyX = useFree && config.bodyPos ? config.bodyPos.x * W : autoTextX;
  const bodyStartY = useFree && config.bodyPos ? config.bodyPos.y * canvasH : autoBodyY;
  const headAlign = align;
  const bodyAlign = align;

  hLines.forEach((line,i) => {
    ctx.font=`900 ${hSize}px Pretendard, 'Noto Sans KR', sans-serif`;
    ctx.textAlign=headAlign; ctx.textBaseline="top";
    ctx.fillStyle="rgba(0,0,0,0.4)";
    ctx.fillText(line, headX+2, headY+i*hLH+2);
    ctx.fillStyle=accent;
    ctx.fillText(line, headX, headY+i*hLH);
  });

  bLines.forEach((line,i) => {
    ctx.font=`${bSize}px Pretendard, 'Noto Sans KR', sans-serif`;
    ctx.fillStyle="#ffffff";
    ctx.textAlign=bodyAlign; ctx.textBaseline="top";
    ctx.fillText(line, bodyX, bodyStartY+i*bLH);
  });

  if (config.showBranding) {
    const fixedPad = W * 0.08;
    ctx.fillStyle="#0f0f0f"; ctx.fillRect(0,canvasH-stripH,W,stripH);
    ctx.fillStyle=accent+"30"; ctx.fillRect(0,canvasH-stripH,W,1);
    const sf=Math.round(W*0.018);
    ctx.font=`bold ${sf}px Pretendard, 'Noto Sans KR', sans-serif`;
    ctx.textAlign="left"; ctx.textBaseline="middle";
    ctx.fillStyle="#ffffff";
    ctx.fillText(config.company||"하이픽셀플러스", fixedPad*0.6, canvasH-stripH/2);
    ctx.textAlign="right"; ctx.fillStyle="#fffff";
    ctx.fillText("Blackmagic Design Authorized Reseller", W-fixedPad*0.6, canvasH-stripH/2);
  }

  ctx.textAlign="left"; ctx.textBaseline="alphabetic";
  drawLogo(ctx, W, canvasH, config, logoImgEl);
}

// ─── Overlay mode draw ──────────────────────────────────────────
function drawOverlay(ctx, W, H, config, imgEl, accent, pad, logoImgEl) {
  const stripH = config.showBranding ? Math.round(H*0.042) : 0;
  const gradStart = config.overlayStart ?? 0.35;
  const textPadX = W * (config.textPadX ?? 0.08);

  if (imgEl) {
    const iR = imgEl.width / imgEl.height, aR = W / H;
    let baseW, baseH;
    if (iR > aR) { baseH = H; baseW = H * iR; }
    else          { baseW = W; baseH = W / iR; }

    const scale  = config.imgScale  ?? 1;
    const ox     = config.imgOffsetX ?? 0;
    const oy     = config.imgOffsetY ?? 0;
    const drawW = baseW * scale;
    const drawH = baseH * scale;
    const drawX = (W - drawW) / 2 + ox * (drawW - W) / 2;
    const drawY = (H - drawH) / 2 + oy * (drawH - H) / 2;

    ctx.drawImage(imgEl, drawX, drawY, drawW, drawH);
  } else {
    ctx.fillStyle="#181818"; ctx.fillRect(0,0,W,H);
    ctx.fillStyle="#303030";
    ctx.font=`${Math.round(W*0.028)}px Pretendard, 'Noto Sans KR', sans-serif`;
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("📷  제품 사진을 업로드하세요", W/2, H*0.35);
  }

  const gradY = Math.round(H * gradStart);
  const fade = ctx.createLinearGradient(0, gradY, 0, H);
  fade.addColorStop(0, "rgba(0,0,0,0)");
  fade.addColorStop(0.5, "rgba(0,0,0,0.6)");
  fade.addColorStop(1, "rgba(0,0,0,0.92)");
  ctx.fillStyle = fade;
  ctx.fillRect(0, gradY, W, H - gradY);

  let hSize = Math.round(W * 0.08 * (config.headSizeScale ?? 1));
  ctx.font = `900 ${hSize}px Pretendard, 'Noto Sans KR', sans-serif`;
  let hLines = wrapText(ctx, config.headline || "", W - textPadX * 2);

  let bSize = Math.round(W * 0.034 * (config.bodySizeScale ?? 1));
  ctx.font = `${bSize}px Pretendard, 'Noto Sans KR', sans-serif`;
  const bLines = wrapText(ctx, config.body || "", W - textPadX * 2);

  let subSize = Math.round(W * 0.03 * (config.badgeScale ?? 1));
  const subText = (config.showBadge && config.badge?.trim()) || "";

  const gapBase = bLines.length ? H * 0.03 : 0;
  const gap = gapBase * (config.textGap ?? 1);
  let hLH = hSize * 1.15;
  let bLH = bSize * 1.55 * (config.bodyLineHeight ?? 1);
  const subH = subText ? subSize * 1.6 : 0;
  let totalH = hLines.length * hLH;
  let totalB = bLines.length * bLH;

  let contentH = subH + totalH + gap + totalB;
  const textAreaTop = H * 0.40;
  const usableH = H - textAreaTop - stripH - H * 0.04;

  if (contentH > usableH) {
    const ratio = usableH / contentH;
    hSize = Math.floor(hSize * ratio);
    bSize = Math.floor(bSize * ratio);
    subSize = Math.floor(subSize * ratio);
    hLH = hSize * 1.15;
    bLH = bSize * 1.55;
    ctx.font = `900 ${hSize}px Pretendard, 'Noto Sans KR', sans-serif`;
    hLines = wrapText(ctx, config.headline || "", W - textPadX * 2);
    totalH = hLines.length * hLH;
    totalB = bLines.length * bLH;
    contentH = (subText ? subSize * 1.6 : 0) + totalH + gap + totalB;
  }

  const vAlign = config.textVAlign ?? 0.5;
  const freeSpace = usableH - contentH;
  const topOffset = textAreaTop + freeSpace * (vAlign * 0.5 + 0.5);
  let curY = topOffset;

  const align = config.textAlign || "center";
  const autoOTextX = align === "left" ? textPadX : align === "right" ? W - textPadX : W / 2;

  const useFree = config.freePos;
  const oHeadX = useFree && config.headPos ? config.headPos.x * W : autoOTextX;
  const oHeadY = useFree && config.headPos ? config.headPos.y * H : curY + (subText ? subSize * 1.6 : 0);
  const oBodyX = useFree && config.bodyPos ? config.bodyPos.x * W : autoOTextX;
  const oBodyY = useFree && config.bodyPos ? config.bodyPos.y * H : curY + (subText ? subSize * 1.6 : 0) + totalH + gap;
  const oAlign = align;

  if (subText && !useFree) {
    ctx.font = `bold ${subSize}px Pretendard, 'Noto Sans KR', sans-serif`;
    ctx.textAlign = align; ctx.textBaseline = "top";
    ctx.fillStyle = "#ffffff";
    ctx.fillText(subText, autoOTextX, curY);
    curY += subSize * 1.6;
  }

  hLines.forEach((line, i) => {
    ctx.font = `900 ${hSize}px Pretendard, 'Noto Sans KR', sans-serif`;
    ctx.textAlign = oAlign; ctx.textBaseline = "top";
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.fillText(line, oHeadX + 2, oHeadY + i * hLH + 2);
    ctx.fillStyle = accent;
    ctx.fillText(line, oHeadX, oHeadY + i * hLH);
  });

  bLines.forEach((line, i) => {
    ctx.font = `${bSize}px Pretendard, 'Noto Sans KR', sans-serif`;
    ctx.fillStyle = "#ffffff";
    ctx.textAlign = oAlign; ctx.textBaseline = "top";
    ctx.fillText(line, oBodyX, oBodyY + i * bLH);
  });

  const fixedPad = W * 0.08;
  if (config.showBranding) {
    ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(0, H - stripH, W, stripH);
    const sf = Math.round(W * 0.018);
    ctx.font = `bold ${sf}px Pretendard, 'Noto Sans KR', sans-serif`;
    ctx.textAlign = "left"; ctx.textBaseline = "middle";
    ctx.fillStyle = "#ffffff";
    ctx.fillText(config.company || "하이픽셀플러스", fixedPad * 0.6, H - stripH / 2);
    ctx.textAlign = "right"; ctx.fillStyle = "#fffff";
    ctx.fillText("Blackmagic Design Authorized Reseller", W - fixedPad * 0.6, H - stripH / 2);
  }

  ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
  drawLogo(ctx, W, H, config, logoImgEl);
}

// ─── Gaussian blur brush ─────────────────────────────────────────
function applyMosaic(canvas, strokes) {
  if (!strokes || !strokes.length) return;
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;

  for (const stroke of strokes) {
    if (!stroke.length) continue;
    const r0 = stroke[0].r || 30;
    const blurAmt = Math.max(4, Math.round(r0 * 0.6));

    ctx.save();
    ctx.beginPath();
    for (const pt of stroke) {
      const r = pt.r || 30;
      ctx.moveTo(pt.x + r, pt.y);
      ctx.arc(pt.x, pt.y, r, 0, Math.PI * 2);
    }
    ctx.clip();

    if (typeof ctx.filter !== "undefined") {
      const tmp = document.createElement("canvas");
      tmp.width = W; tmp.height = H;
      const tctx = tmp.getContext("2d");
      tctx.filter = `blur(${blurAmt}px)`;
      tctx.drawImage(canvas, 0, 0);
      ctx.drawImage(tmp, 0, 0);
    } else {
      const ps = Math.max(8, Math.round(r0 * 0.4));
      for (const pt of stroke) {
        const r = pt.r || 30;
        const left = Math.max(0, Math.floor((pt.x - r) / ps) * ps);
        const top  = Math.max(0, Math.floor((pt.y - r) / ps) * ps);
        for (let bx = left; bx < Math.min(W, pt.x + r); bx += ps) {
          for (let by = top; by < Math.min(H, pt.y + r); by += ps) {
            const dx = bx + ps/2 - pt.x, dy = by + ps/2 - pt.y;
            if (dx*dx + dy*dy > r*r) continue;
            const d = ctx.getImageData(Math.min(bx,W-1), Math.min(by,H-1), 1, 1).data;
            ctx.fillStyle = `rgb(${d[0]},${d[1]},${d[2]})`;
            ctx.fillRect(bx, by, Math.min(ps,W-bx), Math.min(ps,H-by));
          }
        }
      }
    }
    ctx.restore();
  }
}

// ─── Font loader ─────────────────────────────────────────────
let fontReady = false;
try {
  document.fonts.ready.then(() => { fontReady = true; });
  setTimeout(() => { fontReady = true; }, 2000);
} catch(e) { fontReady = true; }

function CanvasPreview({ config, size, scale, exportRef }) {
  const canvasRef = useRef(null);
  const imgRef    = useRef(null);
  const logoRef   = useRef(null);
  const [canvasH, setCanvasH] = useState(size.h);
  if (exportRef) exportRef.current = canvasRef;

  const redraw = useCallback(() => {
    if (canvasRef.current) {
      drawCanvas(canvasRef.current, config, size, imgRef.current, logoRef.current);
      applyMosaic(canvasRef.current, config.blurStrokes);
      setCanvasH(canvasRef.current.height);
    }
  }, [config, size]);

  useEffect(() => {
    if (!fontReady) {
      const t = setInterval(() => { if (fontReady) { clearInterval(t); redraw(); } }, 200);
      return () => clearInterval(t);
    }
  }, [redraw]);

  useEffect(() => {
    if (config.photoUrl) {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => { imgRef.current = img; redraw(); };
      img.onerror = () => {
        const img2 = new Image();
        img2.onload = () => { imgRef.current = img2; redraw(); };
        img2.src = config.photoUrl;
      };
      img.src = config.photoUrl;
    } else {
      imgRef.current = null; redraw();
    }
  }, [config.photoUrl, size, redraw]);

  useEffect(() => {
    if (config.logoUrl) {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => { logoRef.current = img; redraw(); };
      img.onerror = () => {
        const img2 = new Image();
        img2.onload = () => { logoRef.current = img2; redraw(); };
        img2.src = config.logoUrl;
      };
      img.src = config.logoUrl;
    } else {
      logoRef.current = null; redraw();
    }
  }, [config.logoUrl, redraw]);

  useEffect(() => { redraw(); }, [config, redraw]);

  return (
    <canvas ref={canvasRef}
      style={{ width: size.w*scale, height: canvasH*scale, display:"block", borderRadius:4 }} />
  );
}

// ─── Auth Gate (Firestore 기반) ──────────────────────────────
function App() {
  const [mode, setMode]           = useState("login"); // "login" | "signup"
  const [email, setEmail]         = useState("");
  const [password, setPassword]   = useState("");
  const [company, setCompany]     = useState("");
  const [error, setError]         = useState("");
  const [loading, setLoading]     = useState(false);
  const [checkingSession, setCheckingSession] = useState(true);
  const [resellerData, setResellerData] = useState(null);
  const [authUser, setAuthUser]   = useState(null);

  // 세션 유지: 앱 로드 시 로그인 상태 확인
  useEffect(() => {
    const unsub = auth.onAuthStateChanged(async (user) => {
      if (user) {
        const doc = await db.collection("resellers").doc(user.uid).get();
        if (doc.exists && doc.data().status === "approved") {
          setAuthUser(user);
          setResellerData({ name: doc.data().name || "", logo: doc.data().logo || "" });
        } else {
          auth.signOut();
        }
      }
      setCheckingSession(false);
    });
    return () => unsub();
  }, []);

  const handleLogin = async () => {
    if (!email || !password) return;
    setLoading(true); setError("");
    try {
      const cred = await auth.signInWithEmailAndPassword(email, password);
      const doc  = await db.collection("resellers").doc(cred.user.uid).get();
      if (!doc.exists) {
        await auth.signOut();
        setError("등록되지 않은 계정입니다."); return;
      }
      const data = doc.data();
      if (data.status === "pending") {
        await auth.signOut();
        setError("가입 신청이 아직 승인 대기 중입니다.\n하이픽셀플러스 담당자 확인 후 연락드립니다."); return;
      }
      if (data.status === "rejected") {
        await auth.signOut();
        setError("가입이 거절되었습니다. 하이픽셀플러스에 문의해주세요."); return;
      }
      setAuthUser(cred.user);
      setResellerData({ name: data.name || "", logo: data.logo || "" });
    } catch (e) {
      const msg = {
        "auth/user-not-found":  "등록되지 않은 이메일입니다.",
        "auth/wrong-password":  "비밀번호가 올바르지 않습니다.",
        "auth/invalid-email":   "이메일 형식이 올바르지 않습니다.",
        "auth/too-many-requests": "로그인 시도가 너무 많습니다. 잠시 후 다시 시도해주세요.",
      }[e.code] || "로그인 오류: " + e.message;
      setError(msg);
    } finally { setLoading(false); }
  };

  const handleSignup = async () => {
    if (!email || !password || !company) { setError("모든 항목을 입력해주세요."); return; }
    if (password.length < 6) { setError("비밀번호는 6자 이상이어야 합니다."); return; }
    setLoading(true); setError("");
    try {
      const cred = await auth.createUserWithEmailAndPassword(email, password);
      await db.collection("resellers").doc(cred.user.uid).set({
        email,
        name: company,
        logo: "",
        status: "pending",
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      await auth.signOut();
      setMode("login");
      setError(""); 
      // 성공 메시지를 error 필드 재활용 대신 별도 state로 표시
      setSignupDone(true);
    } catch (e) {
      const msg = {
        "auth/email-already-in-use": "이미 가입된 이메일입니다.",
        "auth/invalid-email":        "이메일 형식이 올바르지 않습니다.",
        "auth/weak-password":        "비밀번호가 너무 약합니다.",
      }[e.code] || "가입 오류: " + e.message;
      setError(msg);
    } finally { setLoading(false); }
  };

  const [signupDone, setSignupDone] = useState(false);

  const handleLogout = () => {
    auth.signOut();
    setAuthUser(null); setResellerData(null);
    setEmail(""); setPassword(""); setCompany("");
  };

  if (checkingSession) {
    return (
      <div style={{ height:"100vh", display:"flex", alignItems:"center", justifyContent:"center",
        background:"#111", flexDirection:"column", gap:16 }}>
        <div style={{ width:32, height:32, border:"3px solid #333", borderTop:"3px solid #fff",
          borderRadius:"50%", animation:"spin 0.8s linear infinite" }}/>
        <div style={{ color:"#666", fontSize:14 }}>로그인 상태 확인 중...</div>
      </div>
    );
  }

  if (authUser && resellerData) {
    return <MainApp resellerName={resellerData.name} resellerLogo={resellerData.logo}
      handleLogout={handleLogout} resellerId={authUser.uid} />;
  }

  const inputStyle = {
    width:"100%", padding:"14px 16px", fontSize:15, borderRadius:10,
    border:"2px solid #e8e8e8", outline:"none", marginBottom:12,
    fontFamily:"Pretendard, 'Noto Sans KR', sans-serif",
    transition:"border-color 0.15s",
  };

  return (
    <div style={{ height:"100vh", display:"flex", alignItems:"center", justifyContent:"center",
      background:"#111", fontFamily:"Pretendard, 'Noto Sans KR', sans-serif" }}>
      <div style={{ width:440, padding:"48px 40px", background:"#fff", borderRadius:20,
        boxShadow:"0 24px 80px rgba(0,0,0,0.35)" }}>

        {/* 로고 영역 */}
        <div style={{ textAlign:"center", marginBottom:32 }}>
          <div style={{ display:"inline-flex", alignItems:"center", gap:8, marginBottom:8 }}>
            <div style={{ width:8, height:8, background:"#111", borderRadius:"50%" }}/>
            <span style={{ fontWeight:800, fontSize:14, letterSpacing:"0.12em" }}>BLACKMAGIC DESIGN</span>
          </div>
          <div style={{ fontSize:13, color:"#bbb" }}>리셀러 이미지 메이커</div>
        </div>

        {/* 탭 */}
        <div style={{ display:"flex", background:"#f5f5f5", borderRadius:10, padding:4, marginBottom:28 }}>
          {[{id:"login",label:"로그인"},{id:"signup",label:"가입 신청"}].map(t => (
            <button key={t.id} onClick={() => { setMode(t.id); setError(""); setSignupDone(false); }}
              style={{ flex:1, padding:"10px 0", borderRadius:8, border:"none", fontSize:14,
                fontWeight: mode===t.id ? 700 : 500,
                background: mode===t.id ? "#fff" : "transparent",
                color: mode===t.id ? "#111" : "#aaa",
                boxShadow: mode===t.id ? "0 1px 4px rgba(0,0,0,0.1)" : "none",
                cursor:"pointer", transition:"all 0.15s" }}>
              {t.label}
            </button>
          ))}
        </div>

        {/* 가입 완료 메시지 */}
        {signupDone && mode === "login" && (
          <div style={{ fontSize:13, color:"#16a34a", background:"#f0fdf4",
            border:"1px solid #bbf7d0", borderRadius:8, padding:"12px 14px", marginBottom:16, lineHeight:1.7 }}>
            ✅ 가입 신청이 완료되었습니다.<br/>
            하이픽셀플러스 담당자 승인 후 로그인 가능합니다.
          </div>
        )}

        {/* 로그인 폼 */}
        {mode === "login" && (
          <>
            <input value={email} onChange={e => { setEmail(e.target.value); setError(""); }}
              onKeyDown={e => e.key==="Enter" && handleLogin()}
              placeholder="이메일" type="email" style={inputStyle}/>
            <input value={password} onChange={e => { setPassword(e.target.value); setError(""); }}
              onKeyDown={e => e.key==="Enter" && handleLogin()}
              placeholder="비밀번호" type="password" style={{...inputStyle, marginBottom:20}}/>
          </>
        )}

        {/* 가입 폼 */}
        {mode === "signup" && (
          <>
            <input value={company} onChange={e => { setCompany(e.target.value); setError(""); }}
              placeholder="회사명 (예: 하이픽셀플러스)" style={inputStyle}/>
            <input value={email} onChange={e => { setEmail(e.target.value); setError(""); }}
              placeholder="이메일" type="email" style={inputStyle}/>
            <input value={password} onChange={e => { setPassword(e.target.value); setError(""); }}
              onKeyDown={e => e.key==="Enter" && handleSignup()}
              placeholder="비밀번호 (6자 이상)" type="password" style={{...inputStyle, marginBottom:20}}/>
          </>
        )}

        {/* 에러 */}
        {error && (
          <div style={{ fontSize:13, color:"#dc2626", background:"#fef2f2",
            border:"1px solid #fecaca", borderRadius:8, padding:"10px 14px",
            marginBottom:16, lineHeight:1.6, whiteSpace:"pre-line" }}>{error}</div>
        )}

        {/* 버튼 */}
        <button
          onClick={mode === "login" ? handleLogin : handleSignup}
          disabled={loading}
          style={{ width:"100%", padding:"16px 0", borderRadius:12, border:"none",
            background: loading ? "#ccc" : "#111", color:"#fff", fontSize:16,
            fontWeight:800, cursor: loading ? "default" : "pointer",
            display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
          {loading
            ? <><div style={{ width:16, height:16, border:"2px solid #888",
                borderTop:"2px solid #fff", borderRadius:"50%", animation:"spin 0.8s linear infinite" }}/> 처리 중...</>
            : mode === "login" ? "로그인" : "가입 신청하기"}
        </button>

        <div style={{ marginTop:20, fontSize:12, color:"#ccc", textAlign:"center", lineHeight:1.8 }}>
          {mode === "login"
            ? "계정이 없으신가요? 위의 '가입 신청' 탭을 이용해주세요."
            : "승인은 하이픽셀플러스 담당자가 직접 진행합니다."}
        </div>
      </div>
    </div>
  );
}

  const [blurMode, setBlurMode] = useState(false);
  const [brushSize, setBrushSize] = useState(40);
  const blurStrokeRef = useRef(null);

  const getPointer = (e) => {
    if (e.touches && e.touches.length > 0) return { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY };
    if (e.changedTouches && e.changedTouches.length > 0) return { clientX: e.changedTouches[0].clientX, clientY: e.changedTouches[0].clientY };
    return { clientX: e.clientX, clientY: e.clientY };
  };

  const toCanvasCoords = (e) => {
    const rect = dragAreaRef.current?.getBoundingClientRect();
    if (!rect) return null;
    const p = getPointer(e);
    const canvasEl = exportRef.current?.current;
    const cW = canvasEl ? canvasEl.width : size.w;
    const cH = canvasEl ? canvasEl.height : size.h;
    const x = (p.clientX - rect.left) / rect.width * cW;
    const y = (p.clientY - rect.top) / rect.height * cH;
    return { x, y, cW, cH };
  };

  const textDragRef = useRef(null);

  const onDragStart = (e) => {
    if (e.touches) e.preventDefault();
    const p = getPointer(e);

    // ── [NEW] 캔버스 클릭 시 레이어 자동 선택 ──
    if (!blurMode) {
      const pt = toCanvasCoords(e);
      if (pt) {
        const bounds = calcBounds(cfg, size);
        const hitOrder = ['headline', 'body', 'branding', 'photo'];
        const hit = hitOrder.find(lyr => {
          const b = bounds[lyr];
          return b && pt.x >= b.x && pt.x <= b.x + b.w && pt.y >= b.y && pt.y <= b.y + b.h;
        });
        if (hit) setSelectedLayer(hit);
      }
    }

    if (blurMode) {
      const pt = toCanvasCoords(e);
      if (!pt) return;
      setIsDragging(true);
      const r = brushSize / 100 * size.w;
      blurStrokeRef.current = [{ x: pt.x, y: pt.y, r }];
      updateSlide({ blurStrokes: [...(slide.blurStrokes||[]), blurStrokeRef.current] });
      return;
    }

    // 사진 영역 클릭 여부를 직접 계산해서 판단
    if (!photoUrl) return;
    const pt2 = toCanvasCoords(e);
    const isInPhotoArea = pt2 && (() => {
      if (cfg.layout === 'overlay') return true;
      const photoH = (cfg.photoRatio ?? 0.60) * size.h;
      return pt2.y < photoH;
    })();
    if (!isInPhotoArea) return;
    setIsDragging(true);
    dragState.current = {
      startX: p.clientX, startY: p.clientY,
      startOX: cfg.imgOffsetX, startOY: cfg.imgOffsetY,
    };
  };

  const onDragMove = (e) => {
    if (e.touches) e.preventDefault();

    if (blurMode && isDragging && blurStrokeRef.current) {
      const pt = toCanvasCoords(e);
      if (!pt) return;
      const r = brushSize / 100 * size.w;
      blurStrokeRef.current.push({ x: pt.x, y: pt.y, r });
      const strokes = [...(slide.blurStrokes||[])];
      strokes[strokes.length - 1] = [...blurStrokeRef.current];
      updateSlide({ blurStrokes: strokes });
      return;
    }

    if (!dragState.current) return;
    const { startX, startY, startOX, startOY } = dragState.current;
    const rect = dragAreaRef.current?.getBoundingClientRect();
    if (!rect) return;
    const p = getPointer(e);
    const dx = (p.clientX - startX) / rect.width  * 2;
    const dy = (p.clientY - startY) / rect.height * 2;
    setCfg(prev => ({
      ...prev,
      imgOffsetX: Math.max(-1, Math.min(1, startOX - dx)),
      imgOffsetY: Math.max(-1, Math.min(1, startOY - dy)),
    }));
  };

  const onDragEnd = () => {
    dragState.current = null;
    blurStrokeRef.current = null;
    setIsDragging(false);
  };

  const [urlInput,   setUrlInput]   = useState("");
  const [urlError,   setUrlError]   = useState("");

  const handleFile = (e) => {
    const f = e.target.files[0]; if (!f) return;
    loadImageFile(f);
  };

  const loadImageFile = (file) => {
    if (!file || !file.type.startsWith("image/")) return;
    const r = new FileReader();
    r.onload = ev => { setPhotoUrl(ev.target.result); setUrlError(""); setPasteHint(false); };
    r.readAsDataURL(file);
  };

  useEffect(() => {
    const onPaste = (e) => {
      const tag = document.activeElement?.tagName;
      if (tag === "INPUT" || tag === "TEXTAREA") return;

      const items = e.clipboardData?.items;
      if (!items) return;

      for (const item of items) {
        if (item.type.startsWith("image/")) {
          loadImageFile(item.getAsFile());
          return;
        }
      }

      const html = e.clipboardData.getData("text/html");
      if (html) {
        const match = html.match(/<img[^>]+src=["']([^"']+)["']/i);
        if (match && match[1]) {
          tryLoadImageUrl(match[1]);
          return;
        }
      }

      const text = e.clipboardData.getData("text/plain")?.trim();
      if (text && /^https?:\/\/.+\.(jpg|jpeg|png|webp|gif)/i.test(text)) {
        tryLoadImageUrl(text);
      }
    };

    window.addEventListener("paste", onPaste);
    return () => window.removeEventListener("paste", onPaste);
  }, []);

  const tryLoadImageUrl = (url) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => setPhotoUrl(url);
    img.onerror = () => {

    const changed = nonTextKeys.some(k => prev[k] !== curr[k]);

아래 텍스트를 분석하여 인스타그램 카드 이미지용 제목과 본문을 작성하세요.

<input>
${inputText}
</input>

위 output_format 형식만 출력하세요. 다른 설명 없이.`;

  const callGeminiWithRetry = async (inputText, maxRetry = 3) => {
    const WAIT_SEC = 7;
    for (let attempt = 0; attempt < maxRetry; attempt++) {
      if (attempt > 0) {
        const waitSec = WAIT_SEC * Math.pow(2, attempt - 1);
        for (let i = waitSec; i > 0; i--) {
          setSummarizing(`재시도 중... (${i}초 대기)`);
          await new Promise(r => setTimeout(r, 1000));
        }
        setSummarizing("재시도 중...");
      }
      const response = await fetch(GEMINI_ENDPOINT(apiKey), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: GEMINI_PROMPT(inputText) }] }],
          generationConfig: {
            maxOutputTokens: 1024,
            temperature: 0.7,
            thinkingConfig: { thinkingBudget: 0 },
          },
        }),
      });
      if (response.status === 429) {
        if (attempt === maxRetry - 1) throw new Error("요청 한도 초과입니다. 잠시 후 다시 시도해주세요.");
        continue;
      }
      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        if (response.status === 400 || response.status === 403) {
          throw new Error("AUTH_ERROR");
        }
        throw new Error(errData.error?.message || `API 오류 (${response.status})`);
      }
      return await response.json();
    }
  };

  const handleSummarize = async () => {
    const headText = cfg.headline?.trim() || "";
    const bodyText = cfg.body?.trim() || "";
    const inputText = [headText, bodyText].filter(Boolean).join("\n");
    if (!inputText || inputText === "본문을 입력하세요.") {
      alert("요약할 텍스트를 제목이나 본문에 입력해주세요.");
      return;
    }
    if (!apiKey) {
      setApiKeyInput("");
      setShowApiKeyModal(true);
      return;
    }
    setSummarizing("AI가 분석 중...");
    try {
      const now = Date.now();
      const lastCall = handleSummarize._lastCall || 0;
      const elapsed = now - lastCall;
      if (elapsed < 7000 && lastCall > 0) {
        const remain = Math.ceil((7000 - elapsed) / 1000);
        for (let i = remain; i > 0; i--) {
          setSummarizing(`잠시 대기 중 (${i}초)...`);
          await new Promise(r => setTimeout(r, 1000));
        }
      }
      handleSummarize._lastCall = Date.now();

      setSummarizing("AI가 분석 중...");
      const data = await callGeminiWithRetry(inputText);
      const result = data?.candidates?.[0]?.content?.parts?.[0]?.text;
      if (result) {
        const headlineMatch = result.match(/\[제목\]\s*(.+)/);
        const bodyMatch = result.match(/\[본문\]\s*\n([\s\S]+)/);
        const newHeadline = headlineMatch ? headlineMatch[1].trim() : "";
        const newBody = bodyMatch ? bodyMatch[1].trim() : result.trim();
        const patch = { body: newBody };
        if (newHeadline) patch.headline = newHeadline;
        setCfg({...cfg, ...patch});
      } else {
        alert("요약 결과를 받지 못했습니다. 다시 시도해주세요.");
      }

      console.error("AI 요약 오류:", err);

  // ── 검수 요청 ──────────────────────────────────────────────
  const generateThumbnail = (slideData, sharedData) => new Promise(resolve => {
    const canvas = document.createElement("canvas");
    const thumbW = 360;
    const sc = thumbW / size.w;
    const loadAndDraw = (imgEl) => {
      drawCanvas(canvas, { ...sharedData, ...slideData }, size, imgEl);
      applyMosaic(canvas, slideData.blurStrokes || []);
      const tc = document.createElement("canvas");
      tc.width = thumbW;
      tc.height = Math.round(canvas.height * sc);
      tc.getContext("2d").drawImage(canvas, 0, 0, tc.width, tc.height);
      resolve(tc.toDataURL("image/jpeg", 0.65));
    };
    if (slideData.photoUrl) {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => loadAndDraw(img);
      img.onerror = () => loadAndDraw(null);
      img.src = slideData.photoUrl;
    } else { loadAndDraw(null); }
  });

  const injectMetadata = (dataUrl, mime) => {
    try {
      const copy = cfg.company || "하이픽셀플러스";
      const year = new Date().getFullYear();
      const xmpStr = [
        '<?xpacket begin="\uFEFF" id="W5M0MpCehiHzreSzNTczkc9d"?>',
        '<x:xmpmeta xmlns:x="adobe:ns:meta/">',
        '<rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#">',
        '<rdf:Description xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:xmpRights="http://ns.adobe.com/xap/1.0/rights/" xmlns:photoshop="http://ns.adobe.com/photoshop/1.0/">',
        `<dc:rights><rdf:Alt><rdf:li xml:lang="x-default">© ${year} ${copy}. All rights reserved.</rdf:li></rdf:Alt></dc:rights>`,
        `<dc:creator><rdf:Seq><rdf:li>${copy}</rdf:li></rdf:Seq></dc:creator>`,
        `<xmpRights:Marked>True</xmpRights:Marked>`,
        `<photoshop:Credit>${copy} - Blackmagic Design Authorized Reseller</photoshop:Credit>`,
        '</rdf:Description></rdf:RDF></x:xmpmeta><?xpacket end="w"?>',
      ].join('\n');

      const bin = atob(dataUrl.split(',')[1]);
      const arr = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);

      if (mime === "image/jpeg") {
        const xmpPayload = new TextEncoder().encode('http://ns.adobe.com/xap/1.0/\0' + xmpStr);
        const segLen = xmpPayload.length + 2;
        const segment = new Uint8Array(4 + xmpPayload.length);
        segment[0] = 0xFF; segment[1] = 0xE1;
        segment[2] = (segLen >> 8) & 0xFF; segment[3] = segLen & 0xFF;
        segment.set(xmpPayload, 4);
        const result = new Uint8Array(2 + segment.length + arr.length - 2);
        result.set(arr.subarray(0, 2));
        result.set(segment, 2);
        result.set(arr.subarray(2), 2 + segment.length);
        return URL.createObjectURL(new Blob([result], { type: mime }));
      } else {
        const copyright = `© ${year} ${copy}. Blackmagic Design Authorized Reseller`;
        const key = new TextEncoder().encode('Copyright');
        const val = new TextEncoder().encode(copyright);
        const chunkData = new Uint8Array(key.length + 1 + val.length);
        chunkData.set(key); chunkData[key.length] = 0; chunkData.set(val, key.length + 1);
        const typeBytes = new Uint8Array([0x74,0x45,0x58,0x74]);
        const crcTable = (() => { const t = []; for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=c&1?0xEDB88320^(c>>>1):c>>>1;t[n]=c;}return t;})();
        const crcInput = new Uint8Array(4 + chunkData.length);
        crcInput.set(typeBytes); crcInput.set(chunkData, 4);
        let c = 0xFFFFFFFF; for(let i=0;i<crcInput.length;i++) c=crcTable[(c^crcInput[i])&0xFF]^(c>>>8); c=(c^0xFFFFFFFF)>>>0;
        const chunk = new Uint8Array(12 + chunkData.length);
        const dv = new DataView(chunk.buffer);
        dv.setUint32(0, chunkData.length);
        chunk.set(typeBytes, 4);
        chunk.set(chunkData, 8);
        dv.setUint32(8 + chunkData.length, c);
        const result = new Uint8Array(arr.length + chunk.length);
        result.set(arr.subarray(0, arr.length - 12));
        result.set(chunk, arr.length - 12);
        result.set(arr.subarray(arr.length - 12), arr.length - 12 + chunk.length);
        return URL.createObjectURL(new Blob([result], { type: mime }));
      }
    } catch(e) {
      console.warn("Metadata injection failed:", e);
      return dataUrl;
    }

  const download = () => {
    const canvas = exportRef.current?.current;
    if (!canvas) return;
    try {
      const ext = fmt === "jpeg" ? "jpg" : "png";
      const mime = fmt === "jpeg" ? "image/jpeg" : "image/png";
      const dataUrl = fmt === "jpeg" ? canvas.toDataURL(mime, 0.95) : canvas.toDataURL(mime);
      const blobUrl = injectMetadata(dataUrl, mime);
      const a = document.createElement("a");
      a.download = `bmd-slide${activeSlide+1}-${size.id}.${ext}`;
      a.href = blobUrl; a.click();
      setTimeout(() => { try { URL.revokeObjectURL(blobUrl); } catch(e){} }, 1000);
    } catch(e) {
      alert("저장에 실패했습니다. 사진을 다시 업로드해주세요.");
    }
  };

  const downloadAll = async () => {
    const ext = fmt === "jpeg" ? "jpg" : "png";
    const mime = fmt === "jpeg" ? "image/jpeg" : "image/png";
    let logoImgEl = null;
    if (shared.logoUrl) {
      await new Promise(res => {
        const img = new Image(); img.crossOrigin = "anonymous";
        img.onload = () => { logoImgEl = img; res(); };
        img.onerror = () => res();
        img.src = shared.logoUrl;
      });
    }
    for (let i = 0; i < slides.length; i++) {
      const s = slides[i];
      await new Promise(resolve => {
        const canvas = document.createElement("canvas");
        const loadAndDraw = (imgEl) => {
          drawCanvas(canvas, { ...shared, ...s }, size, imgEl, logoImgEl);
          applyMosaic(canvas, s.blurStrokes);
          const dataUrl = fmt === "jpeg" ? canvas.toDataURL(mime, 0.95) : canvas.toDataURL(mime);
          const blobUrl = injectMetadata(dataUrl, mime);
          setTimeout(() => {
            const a = document.createElement("a");
            a.download = `bmd-slide${i+1}-${size.id}.${ext}`;
            a.href = blobUrl; a.click();
            setTimeout(() => { URL.revokeObjectURL(blobUrl); resolve(); }, 400);
          }, 0);
        };
        if (s.photoUrl) {
          const img = new Image(); img.crossOrigin = "anonymous";
          img.onload = () => loadAndDraw(img);
          img.onerror = () => loadAndDraw(null);
          img.src = s.photoUrl;
        } else { loadAndDraw(null); }
      });
    }
  };

        <span style={{ color:"#ccc", fontSize:16 }}>|</span>
        <span style={{ fontSize:14, color:"#888" }}>리셀러 이미지 메이커</span>
        <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:12 }}>

            💾 저장

          <button onClick={() => setShowHistoryModal(true)}

      {/* ── Slide Tab Bar ── */}

        {slides.map((s, i) => (

                border: "none",

                onMouseLeave={e => { e.currentTarget.style.background="#fff"; e.currentTarget.style.color="#444"; e.currentTarget.style.borderColor="#d8d8d8"; }}>

            flexWrap:"wrap", padding:"12px 24px 0", flexShrink:0 }}>
            <div style={{ display:"flex", gap:6 }}>
              <div style={{ padding:"8px 16px", borderRadius:5, fontSize:14, fontWeight:700,

            <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>

              {blurMode && (<>

                  <input type="range" min="1" max="100" step="1" value={brushSize}
                    onChange={e => setBrushSize(parseInt(e.target.value))}
                    style={{ width:80, accentColor:"#e05555" }}/>
                  <span style={{ fontSize:12, color:"#666", minWidth:30 }}>{brushSize}</span>

                {(slide.blurStrokes||[]).length > 0 && (
                  <button onClick={() => updateSlide({ blurStrokes: [] })}

                  </button>
                )}
              </>)}
              <span style={{ fontSize:12, color:"#999", fontWeight:600, padding:"6px 10px",

              <button onClick={download}

              {slides.length > 1 && (

          {/* Canvas preview */}

            justifyContent:"center", padding:"12px 28px", gap:6, minHeight:0 }}>
            <div style={{ position:"relative" }}>
              <div ref={dragAreaRef}
                onMouseDown={onDragStart} onMouseMove={onDragMove}
                onMouseUp={onDragEnd} onMouseLeave={onDragEnd}
                onTouchStart={onDragStart} onTouchMove={onDragMove}

                <CanvasPreview config={fullCfg} size={size} scale={previewScale} exportRef={exportRef}/>

              {/* ── 선택 바운딩 박스 오버레이 ── */}

            <input value={saveNameInput}
              onChange={e => setSaveNameInput(e.target.value)}
              onKeyDown={e => e.key === "Enter" && handleSaveWork()}
              placeholder={`작업 ${new Date().toLocaleString("ko-KR", { month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit" })}`}
              style={{ width:"100%", padding:"12px 14px", fontSize:14, borderRadius:8,
                border:"2px solid #e0e0e0", outline:"none", marginBottom:20,
                fontFamily:"Pretendard, 'Noto Sans KR', sans-serif" }}
              autoFocus/>
            {lastAutoSave && (
              <div style={{ fontSize:11, color:"#bbb", marginBottom:16 }}>
                마지막 자동저장: {lastAutoSave.toLocaleTimeString("ko-KR")}
              </div>
            )}
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={handleSaveWork}
                style={{ flex:1, padding:"13px 0", borderRadius:8, border:"none",
                  background:"#3b82f6", color:"#fff", fontSize:15, fontWeight:800, cursor:"pointer" }}>
                저장하기
              </button>
              <button onClick={() => { setShowSaveModal(false); setSaveNameInput(""); }}
                style={{ padding:"13px 20px", borderRadius:8, border:"1px solid #ddd",
                  background:"#f5f5f5", color:"#888", fontSize:14, cursor:"pointer" }}>
                취소
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── 히스토리 모달 ── */}
      {showHistoryModal && (
        <div style={{ position:"fixed", inset:0, zIndex:9999, background:"rgba(0,0,0,0.5)",
          display:"flex", alignItems:"center", justifyContent:"center" }}
          onClick={e => { if (e.target===e.currentTarget) setShowHistoryModal(false); }}>
          <div style={{ width:540, maxHeight:"80vh", background:"#fff", borderRadius:16,
            boxShadow:"0 20px 60px rgba(0,0,0,0.3)", display:"flex", flexDirection:"column" }}>
            {/* 모달 헤더 */}
            <div style={{ padding:"24px 28px 16px", borderBottom:"1px solid #eee", flexShrink:0 }}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                <div style={{ fontSize:18, fontWeight:800, color:"#111" }}>🕐 작업 히스토리</div>
                <button onClick={() => setShowHistoryModal(false)}
                  style={{ width:28, height:28, borderRadius:"50%", border:"none", background:"#f0f0f0",
                    cursor:"pointer", fontSize:16, display:"flex", alignItems:"center", justifyContent:"center" }}>×</button>
              </div>
              <div style={{ fontSize:12, color:"#aaa", marginTop:4 }}>
                저장된 작업 {historyList.length}개 · 클릭하면 해당 작업으로 복원됩니다
              </div>
            </div>
            {/* 목록 */}
            <div style={{ flex:1, overflowY:"auto", padding:"12px 16px" }}>
              {historyList.length === 0 ? (
                <div style={{ textAlign:"center", padding:"40px 0", color:"#bbb", fontSize:14 }}>
                  저장된 작업이 없습니다.<br/>헤더의 💾 저장 버튼을 눌러 작업을 저장하세요.
                </div>
              ) : historyList.map((item) => {
                const date = new Date(item.savedAt);
                const isAuto = item.name === "자동저장";
                return (
                  <div key={item.id}
                    style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 14px",
                      borderRadius:10, marginBottom:6, background:"#f8f8f8", border:"1px solid #eee",
                      transition:"background 0.1s" }}
                    onMouseEnter={e => e.currentTarget.style.background="#f0f0f0"}
                    onMouseLeave={e => e.currentTarget.style.background="#f8f8f8"}>
                    {/* 썸네일 자리 */}
                    <div style={{ width:44, height:54, borderRadius:6, background:"#e0e0e0",
                      display:"flex", alignItems:"center", justifyContent:"center",
                      fontSize:18, flexShrink:0 }}>
                      🖼️
                    </div>
                    {/* 정보 */}
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:3 }}>
                        {isAuto && (
                          <span style={{ fontSize:10, padding:"2px 6px", borderRadius:10,
                            background:"#fef3c7", color:"#d97706", fontWeight:700 }}>자동</span>
                        )}
                        <span style={{ fontSize:14, fontWeight:700, color:"#222",
                          overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                          {item.name}
                        </span>
                      </div>
                      <div style={{ fontSize:11, color:"#aaa" }}>
                        슬라이드 {item.slides?.length || 1}장 &nbsp;·&nbsp;
                        {date.toLocaleString("ko-KR", { month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit" })}
                      </div>
                    </div>
                    {/* 버튼 */}
                    <div style={{ display:"flex", gap:6, flexShrink:0 }}>
                      <button onClick={() => loadFromHistory(item)}
                        style={{ padding:"7px 14px", borderRadius:6, border:"none",
                          background:"#111", color:"#fff", fontSize:12, fontWeight:700, cursor:"pointer" }}>
                        불러오기
                      </button>
                      <button onClick={() => {
                          if (window.confirm(`"${item.name}" 을 삭제하시겠습니까?`)) deleteFromHistory(item.id);
                        }}
                        style={{ padding:"7px 10px", borderRadius:6, border:"1px solid #ffcccc",
                          background:"#fff0f0", color:"#e05555", fontSize:12, cursor:"pointer" }}>
                        삭제
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
            {/* 모달 하단 */}
            <div style={{ padding:"14px 20px", borderTop:"1px solid #eee", flexShrink:0,
              display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <button onClick={() => { setShowHistoryModal(false); setShowSaveModal(true); }}
                style={{ padding:"9px 18px", borderRadius:7, border:"none",
                  background:"#3b82f6", color:"#fff", fontSize:13, fontWeight:700, cursor:"pointer" }}>
                💾 지금 저장하기
              </button>
              {historyList.length > 0 && (
                <button onClick={() => {
                    if (window.confirm("전체 히스토리를 삭제하시겠습니까?")) {
                      setHistoryList([]);
                      try { localStorage.removeItem("bmd_history"); } catch(e) {}
                    }
                  }}
                  style={{ padding:"9px 14px", borderRadius:7, border:"1px solid #ddd",
                    background:"transparent", color:"#bbb", fontSize:12, cursor:"pointer" }}>
                  전체 삭제
                </button>
              )}
            </div>
          </div>
        </div>
      )}

      {/* ── API Key Modal ── */}
      {showApiKeyModal && (
        <div style={{ position:"fixed", inset:0, zIndex:9999, background:"rgba(0,0,0,0.5)",
          display:"flex", alignItems:"center", justifyContent:"center" }}
          onClick={(e) => { if (e.target === e.currentTarget) setShowApiKeyModal(false); }}>
          <div style={{ width:440, background:"#fff", borderRadius:16, padding:"36px 32px",
            boxShadow:"0 20px 60px rgba(0,0,0,0.3)" }}>
            <div style={{ fontSize:18, fontWeight:800, color:"#333", marginBottom:6 }}>
              ✨ AI 요약 — API 키 설정
            </div>
            <div style={{ fontSize:13, color:"#888", marginBottom:20, lineHeight:1.7 }}>
              Google Gemini API 키를 입력하면 제품 설명을<br/>
              인스타그램 카드용 본문으로 자동 요약할 수 있습니다.<br/>
              <span style={{ color:"#16a34a", fontWeight:600 }}>무료 티어로 하루 1,000건까지 사용 가능합니다.</span>
            </div>
            <div style={{ fontSize:12, color:"#666", marginBottom:8, fontWeight:600 }}>Google Gemini API Key</div>
            <input value={apiKeyInput}
              onChange={e => setApiKeyInput(e.target.value)}
              onKeyDown={e => e.key === "Enter" && saveApiKey()}
              placeholder="AIza..."
              type="password"
              style={{ width:"100%", padding:"14px 16px", fontSize:14, borderRadius:8,
                border:"2px solid #ddd", outline:"none", marginBottom:12, fontFamily:"monospace" }}/>
            <div style={{ fontSize:11, color:"#aaa", marginBottom:20, lineHeight:1.6 }}>
              키는 이 브라우저의 localStorage에만 저장됩니다.<br/>
              <a href="https://aistudio.google.com/apikey" target="_blank"
                style={{ color:"#6366f1" }}>Google AI Studio</a>에서 무료로 발급받을 수 있습니다.
            </div>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={saveApiKey}
                style={{ flex:1, padding:"14px 0", borderRadius:8, border:"none",
                  background:"#111", color:"#fff", fontSize:15, fontWeight:700, cursor:"pointer" }}>
                저장
              </button>
              {apiKey && (
                <button onClick={clearApiKey}
                  style={{ padding:"14px 20px", borderRadius:8, border:"1px solid #ffcccc",
                    background:"#fff0f0", color:"#e05555", fontSize:14, fontWeight:600, cursor:"pointer" }}>
                  삭제
                </button>
              )}
              <button onClick={() => setShowApiKeyModal(false)}
                style={{ padding:"14px 20px", borderRadius:8, border:"1px solid #ddd",
                  background:"#f5f5f5", color:"#888", fontSize:14, cursor:"pointer" }}>
                닫기
              </button>
            </div>
          </div>
        </div>
      )}

      <style>{`
        * { box-sizing:border-box; margin:0; padding:0; }
        input, textarea { outline:none !important; }
        input[type="range"] { height:8px; cursor:pointer; }
        input[type="range"]::-webkit-slider-thumb { width:20px; height:20px; }
        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-track { background:#f0f0f0; }
        ::-webkit-scrollbar-thumb { background:#bbb; border-radius:3px; }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
